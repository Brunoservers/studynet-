<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#080812"/>
<title>StudyNet</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080812;--sf:#111122;--sf2:#161628;
  --bd:#1c1c35;--bd2:#252540;
  --tx:#ededf5;--mu:#5a5a80;--mu2:#8888aa;
  --ac:#634cdc;--ac2:#38b69b;
  --fh:'Fraunces',serif;--fb:'DM Sans',sans-serif;
  --r:13px;--rl:20px;
}
html,body{min-height:100vh}
body{background:var(--bg);color:var(--tx);font-family:var(--fb);font-size:15px;line-height:1.6;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 15% 0%,rgba(99,76,220,.08),transparent),radial-gradient(ellipse 50% 40% at 85% 100%,rgba(56,182,155,.06),transparent);pointer-events:none;z-index:0}
#app{position:relative;z-index:1;min-height:100vh}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:9px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade{from{opacity:0}to{opacity:1}}
.page{min-height:100vh;display:flex;flex-direction:column}
.wrap{max-width:860px;margin:0 auto;padding:32px 18px;width:100%;flex:1}
.wrap-sm{max-width:540px}
.ctr{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;padding:24px;text-align:center}
.hdr{background:rgba(8,8,18,.92);backdrop-filter:blur(18px);border-bottom:1px solid var(--bd);padding:0 18px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:9px;color:var(--tx)}
.logo-mk{width:32px;height:32px;background:linear-gradient(135deg,var(--ac),var(--ac2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-tx{font-family:var(--fh);font-weight:900;font-size:18px;letter-spacing:-.4px}
.hdr-r{display:flex;align-items:center;gap:8px}
.badge{background:rgba(99,76,220,.15);color:#a48fff;border:1px solid rgba(99,76,220,.3);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600;letter-spacing:.7px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:var(--r);font-family:var(--fb);font-weight:600;font-size:14px;cursor:pointer;transition:all .17s;white-space:nowrap;text-decoration:none;padding:10px 20px}
.btn:active{transform:scale(.96)}.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-p{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;box-shadow:0 3px 18px rgba(99,76,220,.28)}
.btn-g{background:var(--sf2);color:var(--mu2);border:1px solid var(--bd2)}.btn-g:hover{color:var(--tx)}
.btn-d{background:rgba(255,77,109,.1);color:#ff4d6d;border:1px solid rgba(255,77,109,.3)}
.btn-gr{background:rgba(56,182,155,.1);color:var(--ac2);border:1.5px solid var(--ac2)}
.btn-sm{padding:6px 13px;font-size:13px}.btn-fw{width:100%}
.inp,.sel{width:100%;background:var(--sf);border:1.5px solid var(--bd2);border-radius:var(--r);padding:11px 14px;color:var(--tx);font-family:var(--fb);font-size:14px;outline:none;transition:border-color .18s;appearance:none}
.inp:focus,.sel:focus{border-color:var(--ac)}.inp::placeholder{color:var(--mu)}
.lbl{display:block;font-size:12px;color:var(--mu2);font-weight:600;margin-bottom:6px}
.gate-pg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 25% 35%,rgba(99,76,220,.1),transparent 55%),radial-gradient(ellipse at 75% 70%,rgba(56,182,155,.07),transparent 50%),var(--bg)}
.gate-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:40px 32px;width:100%;max-width:400px;display:flex;flex-direction:column;align-items:center;gap:14px;animation:up .4s ease;box-shadow:0 10px 50px rgba(0,0,0,.5)}
.gate-logo{width:60px;height:60px;background:linear-gradient(135deg,var(--ac),var(--ac2));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px}
.gate-title{font-family:var(--fh);font-weight:900;font-size:30px;letter-spacing:-.8px}
.gate-sub{color:var(--mu);font-size:13px}
.dvd{width:100%;display:flex;align-items:center;gap:10px;color:var(--mu);font-size:11px}
.dvd::before,.dvd::after{content:"";flex:1;height:1px;background:var(--bd)}
.gate-row{display:flex;gap:8px;width:100%}
.gate-err{color:#ff4d6d;font-size:13px;text-align:center;animation:up .2s ease}
.hero{margin-bottom:28px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.hero-title{font-family:var(--fh);font-weight:900;font-size:30px;letter-spacing:-.7px;line-height:1.15}
.hero-sub{color:var(--mu2);font-size:13px;margin-top:5px}
.subj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.subj-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .18s;animation:up .3s ease both}
.subj-card:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,.35)}
.subj-top{height:3px}
.subj-body{padding:20px}
.subj-ico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:11px}
.subj-name{font-family:var(--fh);font-weight:700;font-size:15px;line-height:1.3;margin-bottom:3px}
.subj-sub{font-size:11px;color:var(--mu);margin-bottom:12px;min-height:14px}
.subj-ft{display:flex;align-items:center;justify-content:space-between}
.subj-chip{font-size:11px;font-weight:600;padding:3px 11px;border-radius:99px}
.subj-adm{display:flex;gap:5px}
.subj-hdr{margin-bottom:24px}
.subj-title{font-family:var(--fh);font-weight:900;font-size:24px;letter-spacing:-.5px;line-height:1.2;margin-bottom:4px}
.subj-meta{font-size:13px;color:var(--mu)}
.file-list{display:flex;flex-direction:column;gap:12px}
.file-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;animation:up .25s ease both}
.file-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;gap:12px;flex-wrap:wrap}
.file-info{display:flex;align-items:center;gap:12px;min-width:0;flex:1}
.file-ico{font-size:24px;flex-shrink:0}
.file-name{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-date{font-size:11px;color:var(--mu);margin-top:2px}
.file-acts{display:flex;gap:7px;flex-shrink:0;flex-wrap:wrap}
.link-zone{padding:0 18px 15px;border-top:1px solid var(--bd)}
.link-lbl{font-size:11px;color:var(--mu2);font-weight:600;padding:10px 0 7px;display:flex;align-items:center;gap:5px}
.link-box{display:flex;align-items:center;gap:8px;background:rgba(99,76,220,.07);border:1px solid rgba(99,76,220,.2);border-radius:var(--r);padding:9px 13px}
.link-box a{color:#a48fff;font-size:13px;text-decoration:none;flex:1;word-break:break-all}
.link-box a:hover{text-decoration:underline}
.link-edit-row{display:flex;gap:7px}
.link-edit-row .inp{font-size:13px;padding:8px 12px}
.link-empty{font-size:13px;color:var(--mu);font-style:italic}
.drop{border:2px dashed var(--bd2);border-radius:var(--rl);padding:38px 18px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:16px;user-select:none}
.drop:hover,.drop-on{border-color:var(--ac);background:rgba(99,76,220,.05)}
.drop-ico{font-size:40px;margin-bottom:10px}
.drop-lbl{font-family:var(--fh);font-weight:700;font-size:16px;margin-bottom:3px}
.drop-hint{font-size:13px;color:var(--mu)}
.prog-wrap{height:6px;background:var(--bd);border-radius:99px;overflow:hidden;margin-bottom:8px}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));border-radius:99px;transition:width .25s}
.prog-msg{font-size:13px;color:var(--mu);text-align:center}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:18px;animation:fade .2s ease}
.modal{background:var(--sf);border:1px solid var(--bd2);border-radius:var(--rl);padding:28px 24px;width:100%;max-width:420px;display:flex;flex-direction:column;gap:13px;box-shadow:0 14px 50px rgba(0,0,0,.6);animation:up .22s ease}
.modal-title{font-family:var(--fh);font-weight:900;font-size:20px;letter-spacing:-.4px}
.modal-row{display:flex;gap:8px}
.modal-row .btn{flex:1}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px}
.emj{background:var(--sf2);border:2px solid transparent;border-radius:8px;padding:6px;font-size:19px;cursor:pointer;transition:all .14s;text-align:center}
.emj:hover,.emj-on{border-color:var(--ac);background:rgba(99,76,220,.15)}
.clr-grid{display:flex;flex-wrap:wrap;gap:7px}
.clr{width:30px;height:30px;border-radius:8px;border:3px solid transparent;cursor:pointer;transition:all .14s}
.clr-on{border-color:#fff;transform:scale(1.12)}
.set-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:24px;display:flex;flex-direction:column;gap:11px}
.set-card h3{font-family:var(--fh);font-weight:700;font-size:16px}
.set-card p{color:var(--mu);font-size:13px}
.ok-msg{color:var(--ac2);font-size:13px;animation:up .2s ease}
.empty{text-align:center;padding:52px 20px;display:flex;flex-direction:column;align-items:center;gap:12px}
.empty-title{font-family:var(--fh);font-weight:700;font-size:19px;color:var(--mu2)}
.empty-sub{color:var(--mu);max-width:300px;font-size:13px}
.spin{width:34px;height:34px;border:3px solid var(--bd2);border-top-color:var(--ac);border-radius:50%;animation:spin .65s linear infinite}
@media(max-width:600px){
  .wrap{padding:22px 14px}.hdr{padding:0 14px}
  .subj-grid{grid-template-columns:1fr}
  .gate-card{padding:32px 20px}.hero-title{font-size:24px}
  .modal{padding:24px 18px}
}

/* ── Visualizador de documentos ── */
.doc-viewer-ov{position:fixed;inset:0;background:#0a0a14;z-index:300;display:flex;flex-direction:column;animation:fade .2s ease}
.doc-viewer-bar{display:flex;align-items:center;gap:8px;padding:9px 14px;background:#0d0f1c;border-bottom:1px solid var(--bd);flex-shrink:0;flex-wrap:nowrap;min-width:0}
.doc-viewer-title{flex:1;font-family:var(--fh);font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;color:var(--tx)}
.doc-viewer-badge{display:inline-block;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0}
.dvb-pdf{background:rgba(248,113,113,.18);color:#f87171}
.dvb-docx{background:rgba(99,76,220,.2);color:#a48fff}
.dvb-ppt{background:rgba(251,146,60,.18);color:#fb923c}
.dvb-xls{background:rgba(52,211,153,.18);color:#34d399}
.dvb-other{background:rgba(136,136,170,.12);color:var(--mu2)}

/* Corpo do viewer */
.doc-viewer-body{flex:1;overflow:hidden;position:relative;background:#141420;display:flex;flex-direction:column}

/* ── PDF Canvas Viewer ── */
#dv-pdf-wrap{flex:1;overflow:hidden;position:relative;touch-action:none;cursor:grab;user-select:none}
#dv-pdf-wrap.grabbing{cursor:grabbing}
#dv-pdf-canvas-layer{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
#dv-pdf-canvas-layer canvas{display:block;box-shadow:0 4px 32px rgba(0,0,0,.6);margin:0 auto}

/* Barra de progresso + página */
#dv-pdf-footer{display:flex;align-items:center;gap:10px;padding:8px 14px;background:#0d0f1c;border-top:1px solid var(--bd);flex-shrink:0}
#dv-pdf-progress-track{flex:1;height:4px;background:var(--bd2);border-radius:99px;overflow:hidden;cursor:pointer}
#dv-pdf-progress-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));border-radius:99px;transition:width .25s}
#dv-pdf-page-lbl{font-size:12px;color:var(--mu2);white-space:nowrap;font-weight:600;min-width:56px;text-align:right}
.dv-nav-btn{background:var(--sf2);border:1px solid var(--bd2);color:var(--mu2);border-radius:7px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;flex-shrink:0;transition:all .15s}
.dv-nav-btn:hover{background:var(--bd2);color:var(--tx)}
.dv-nav-btn:disabled{opacity:.3;cursor:not-allowed}
.dv-zoom-btn{background:var(--sf2);border:1px solid var(--bd2);color:var(--mu2);border-radius:7px;padding:0 9px;height:30px;display:flex;align-items:center;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0;transition:all .15s;gap:4px}
.dv-zoom-btn:hover{background:var(--bd2);color:var(--tx)}

/* DOCX */
#dv-docx-out{flex:1;overflow-y:auto;background:#fff;color:#111;font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.8;padding:32px clamp(16px,5vw,80px);box-sizing:border-box}
#dv-docx-out h1,#dv-docx-out h2,#dv-docx-out h3{margin:1.2em 0 .4em;font-weight:700}
#dv-docx-out p{margin-bottom:.7em}
#dv-docx-out table{border-collapse:collapse;width:100%;margin:1em 0}
#dv-docx-out td,#dv-docx-out th{border:1px solid #ddd;padding:.4rem .7rem}

/* Office iframe */
#dv-office-frame{flex:1;border:none;display:block;background:#fff}

/* Status / loading */
.doc-viewer-status{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--mu2);font-size:13px;background:#141420;z-index:10}
.doc-viewer-status .spin{width:32px;height:32px}

.btn-eye{background:rgba(99,76,220,.12);color:#a48fff;border:1px solid rgba(99,76,220,.3)}
.btn-eye:hover{background:rgba(99,76,220,.22);color:#c4b5fd}
.btn-ai{background:linear-gradient(135deg,rgba(99,76,220,.2),rgba(56,182,155,.2));color:#c4b5fd;border:1px solid rgba(99,76,220,.4)}
.btn-ai:hover{background:linear-gradient(135deg,rgba(99,76,220,.35),rgba(56,182,155,.3));color:#fff}

/* ── AI Study Panel ── */
.ai-panel-ov{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);z-index:400;display:flex;flex-direction:column;animation:fade .2s ease}
.ai-panel{display:flex;flex-direction:column;height:100%;max-width:780px;margin:0 auto;width:100%}
.ai-panel-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:rgba(8,8,18,.95);border-bottom:1px solid var(--bd);flex-shrink:0}
.ai-panel-title{flex:1;font-family:var(--fh);font-weight:900;font-size:15px;letter-spacing:-.3px}
.ai-panel-body{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:14px}
.ai-tabs{display:flex;gap:6px;flex-wrap:wrap;padding:12px 16px;background:rgba(8,8,18,.6);border-bottom:1px solid var(--bd);flex-shrink:0}
.ai-tab{background:var(--sf2);border:1px solid var(--bd2);color:var(--mu2);border-radius:8px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.ai-tab.on{background:rgba(99,76,220,.2);color:#c4b5fd;border-color:rgba(99,76,220,.4)}
.ai-section{display:none;flex-direction:column;gap:12px;animation:up .2s ease}
.ai-section.on{display:flex}
.ai-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:18px}
.ai-card-title{font-family:var(--fh);font-weight:700;font-size:13px;color:var(--ac2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.ai-card p{font-size:14px;line-height:1.75;color:var(--tx)}
.ai-card ul,.ai-card ol{padding-left:20px;display:flex;flex-direction:column;gap:6px}
.ai-card li{font-size:14px;line-height:1.6;color:var(--tx)}

/* Flashcards */
.fc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.fc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:18px;cursor:pointer;transition:all .2s;min-height:110px;display:flex;flex-direction:column;gap:8px;position:relative}
.fc:hover{border-color:var(--ac);transform:translateY(-2px)}
.fc-q{font-size:13px;font-weight:600;color:var(--tx);line-height:1.5}
.fc-a{font-size:13px;color:var(--ac2);line-height:1.5;display:none;border-top:1px solid var(--bd);padding-top:8px;margin-top:4px}
.fc.open .fc-a{display:block}
.fc-hint{font-size:11px;color:var(--mu);margin-top:auto}

/* Quiz */
.quiz-q{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:18px;display:flex;flex-direction:column;gap:10px}
.quiz-q-txt{font-size:14px;font-weight:600;line-height:1.5}
.quiz-opts{display:flex;flex-direction:column;gap:7px}
.quiz-opt{background:var(--sf2);border:1.5px solid var(--bd2);border-radius:10px;padding:10px 14px;font-size:13px;cursor:pointer;transition:all .15s;text-align:left}
.quiz-opt:hover{border-color:var(--ac);color:var(--tx)}
.quiz-opt.correct{background:rgba(56,182,155,.15);border-color:var(--ac2);color:var(--ac2)}
.quiz-opt.wrong{background:rgba(255,77,109,.1);border-color:#ff4d6d;color:#ff4d6d}
.quiz-exp{font-size:12px;color:var(--mu2);padding:8px 12px;background:rgba(99,76,220,.07);border-radius:8px;display:none}
.quiz-exp.on{display:block}
.quiz-score{background:linear-gradient(135deg,rgba(99,76,220,.15),rgba(56,182,155,.1));border:1px solid rgba(99,76,220,.3);border-radius:var(--rl);padding:20px;text-align:center}
.quiz-score-num{font-family:var(--fh);font-weight:900;font-size:42px;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* Exercícios */
.ex-item{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:18px;display:flex;flex-direction:column;gap:10px}
.ex-num{font-size:11px;font-weight:700;color:var(--ac);text-transform:uppercase;letter-spacing:.05em}
.ex-txt{font-size:14px;line-height:1.6}
.ex-ans{background:rgba(56,182,155,.07);border:1px solid rgba(56,182,155,.2);border-radius:10px;padding:12px;font-size:13px;color:var(--ac2);display:none}
.ex-ans.on{display:block}

/* Conceitos */
.concept-item{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:16px;display:flex;gap:12px;align-items:flex-start}
.concept-dot{width:8px;height:8px;border-radius:50%;background:var(--ac);flex-shrink:0;margin-top:6px}
.concept-name{font-weight:700;font-size:14px;margin-bottom:3px}
.concept-def{font-size:13px;color:var(--mu2);line-height:1.6}

/* Progresso */
.prog-subject{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:16px 18px;display:flex;flex-direction:column;gap:8px}
.prog-subject-name{font-weight:600;font-size:14px;display:flex;justify-content:space-between}
.prog-bar-wrap{height:6px;background:var(--bd2);border-radius:99px;overflow:hidden}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));border-radius:99px;transition:width .5s ease}
.prog-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.prog-stat{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px;text-align:center}
.prog-stat-num{font-family:var(--fh);font-weight:900;font-size:26px;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.prog-stat-lbl{font-size:11px;color:var(--mu);margin-top:2px}

/* AI loading */
.ai-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:48px 20px;text-align:center}
.ai-loading-txt{font-size:13px;color:var(--mu2)}
.ai-gen-steps{display:flex;flex-direction:column;gap:8px;width:100%;max-width:280px}

// ── Supabase REST helpers ─────────────────────────
async function sbFetch(path, opts = {}) {
  const res = await fetch(SUPA_URL + "/rest/v1/" + path, {
    headers: {
      "apikey":        SUPA_KEY,
      "Authorization": "Bearer " + SUPA_KEY,
      "Content-Type":  "application/json",
      "Prefer":        opts.prefer || "return=representation",
      ...opts.headers,
    },
    method: opts.method || "GET",
    body:   opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || "Erro Supabase " + res.status);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

// ── CRUD Subjects ─────────────────────────────────
async function sbGetSubjects() {

async function sbAddSubject(s) {

async function sbEditSubject(id, p) {

async function sbDelSubject(id) {

    prefer: "resolution=merge-duplicates",
  });
}

// ── Hash SHA-256 ──────────────────────────────────
async function sha256(text) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

// ── Supabase Storage upload ───────────────────────
async function uploadToSupabase(file, onProgress) {
  const allowedExts = [".pdf",".doc",".docx",".ppt",".pptx",".xls",".xlsx",".zip",".rar",".txt"];
  const ext = "." + file.name.split(".").pop().toLowerCase();
  if (!allowedExts.includes(ext)) throw new Error("Tipo não permitido: " + ext);
  if (file.size > 50 * 1024 * 1024) throw new Error("Arquivo muito grande. Máximo: 50MB");

  // Simula progresso enquanto faz o upload
  let prog = 0;
  const progInterval = setInterval(() => {
    prog = Math.min(prog + 5, 85);
    if (onProgress) onProgress(prog);
  }, 200);

  const fileName = Date.now() + "_" + file.name.replace(/[^a-zA-Z0-9._-]/g, "_");

  try {
    const res = await fetch(SUPA_URL + "/storage/v1/object/files/" + fileName, {
      method: "POST",
      headers: {
        "apikey":        SUPA_KEY,
        "Authorization": "Bearer " + SUPA_KEY,
        "Content-Type":  file.type || "application/octet-stream",
        "x-upsert":      "true",
      },
      body: file,
    });

    clearInterval(progInterval);
    if (onProgress) onProgress(100);

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || err.message || "Erro no upload: " + res.status);
    }

    const publicUrl = SUPA_URL + "/storage/v1/object/public/files/" + fileName;
    return { url: publicUrl, publicId: fileName, bytes: file.size };
  } catch(e) {
    clearInterval(progInterval);
    throw e;
  }
}

// ── Mantém compatibilidade (arquivos antigos do Cloudinary continuam funcionando) ──
function normalizeCloudinaryUrl(url) {
  if (!url) return url;
  return url.replace(/\/image\/upload\//g, "/raw/upload/")
            .replace(/\/video\/upload\//g, "/raw/upload/")
            .replace(/\/auto\/upload\//g,  "/raw/upload/");
}

// ── Helpers ───────────────────────────────────────
function gid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function esc(s) { return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmtDate(iso) { try { return new Date(iso).toLocaleDateString("pt-BR"); } catch { return ""; } }
function fmtSize(b) {
  if (!b) return "";
  if (b < 1024) return b + " B";
  if (b < 1048576) return Math.round(b/1024) + " KB";
  return (b/1048576).toFixed(1) + " MB";
}
function fileIcon(name) {
  const n = (name||"").toLowerCase();
  if (n.endsWith(".pdf")) return "📄";
  if (n.endsWith(".doc") || n.endsWith(".docx")) return "📝";
  if (n.endsWith(".ppt") || n.endsWith(".pptx")) return "📊";
  if (n.endsWith(".xls") || n.endsWith(".xlsx")) return "📈";
  if (n.endsWith(".zip") || n.endsWith(".rar")) return "🗜";
  if (n.endsWith(".txt")) return "📃";
  return "📎";
}

function openModal(html, onMount) {
  document.getElementById("_ov")?.remove();
  const ov = document.createElement("div");
  ov.className = "ov"; ov.id = "_ov";
  ov.innerHTML = `<div class="modal">${html}</div>`;
  ov.onclick = e => { if (e.target === ov) closeModal(); };
  document.body.appendChild(ov);
  onMount?.(ov.querySelector(".modal"));
}
function closeModal() { document.getElementById("_ov")?.remove(); }

function openSubjModal(existing = null) {
  const isEdit = !!existing;
  let selEmoji = existing?.emoji || "📚";
  let selColor = existing?.color || "#a78bfa";

  openModal(`
    <p class="modal-title">${isEdit ? "Editar Matéria" : "Nova Matéria"}</p>
    <div>
      <span class="lbl">Ícone</span>
      <div class="emoji-grid">${EMOJIS.map(e=>`<button class="emj${e===selEmoji?" emj-on":""}" data-e="${e}">${e}</button>`).join("")}</div>
    </div>
    <div>
      <span class="lbl">Cor</span>
      <div class="clr-grid">${COLORS.map(c=>`<div class="clr${c===selColor?" clr-on":""}" data-c="${c}" style="background:${c}"></div>`).join("")}</div>
    </div>
    <div><label class="lbl">Nome *</label><input class="inp" id="mName" placeholder="ex: Cálculo I" value="${esc(existing?.name||"")}"/></div>
    <div><label class="lbl">Subtítulo (opcional)</label><input class="inp" id="mSub" placeholder="ex: Derivadas e Integrais" value="${esc(existing?.sub||"")}"/></div>
    <div class="modal-row">
      <button class="btn btn-g" id="mCan">Cancelar</button>
      <button class="btn btn-p" id="mOk">${isEdit ? "Salvar" : "Criar"}</button>
    </div>`,
  m => {
    m.querySelectorAll(".emj").forEach(b => {
      b.onclick = () => { selEmoji=b.dataset.e; m.querySelectorAll(".emj").forEach(x=>x.className="emj"+(x.dataset.e===selEmoji?" emj-on":"")); };
    });
    m.querySelectorAll(".clr").forEach(b => {
      b.onclick = () => { selColor=b.dataset.c; m.querySelectorAll(".clr").forEach(x=>x.className="clr"+(x.dataset.c===selColor?" clr-on":"")); };

      const name = m.querySelector("#mName").value.trim();

      const sub = m.querySelector("#mSub").value.trim();

      }

function renderLinkZone(f) {
  const lz = document.getElementById(`lz_${f.id}`);
  if (!lz) return;
  if (f.resume_link) {
    lz.innerHTML = `<div class="link-box">
      <a href="${esc(f.resume_link)}" target="_blank" rel="noopener">📄 Abrir resumo</a>
      ${S.role==="adm" ? `<button class="btn btn-g btn-sm" id="le_${f.id}">✏️</button>` : ""}
    </div>`;
    document.getElementById(`le_${f.id}`)?.addEventListener("click", () => editLinkZone(f));
  } else {
    lz.innerHTML = S.role==="adm"
      ? `<button class="btn btn-g btn-sm" id="la_${f.id}">+ Adicionar link do resumo</button>`
      : `<span class="link-empty">Nenhum resumo disponível ainda.</span>`;
    document.getElementById(`la_${f.id}`)?.addEventListener("click", () => editLinkZone(f));
  }
}

function editLinkZone(f) {
  const lz = document.getElementById(`lz_${f.id}`);
  if (!lz) return;
  lz.innerHTML = `<div class="link-edit-row">
    <input class="inp" id="li_${f.id}" placeholder="Cole o link do resumo aqui…" value="${esc(f.resume_link||"")}"/>
    <button class="btn btn-p btn-sm" id="ls_${f.id}">Salvar</button>
    <button class="btn btn-g btn-sm" id="lc_${f.id}">✕</button>
  </div>`;
  document.getElementById(`ls_${f.id}`).onclick = async () => {
    const v = document.getElementById(`li_${f.id}`).value.trim();
    try {
      await sbEditFile(f.id, { resume_link: v });
      f.resume_link = v;
      renderLinkZone(f);
    } catch(err) { alert("Erro ao salvar link: " + err.message); }
  };
  document.getElementById(`lc_${f.id}`).onclick = () => renderLinkZone(f);
}

async function uploadView() {
  if (S.role !== "adm") { go("home"); return; }

  const page = document.createElement("div"); page.className = "page";
  page.appendChild(mkHdr());
  const wrap = document.createElement("main"); wrap.className = "wrap wrap-sm";

  // busca dados do subject
  let subj = null;
  try {
    const subjs = await sbGetSubjects();
    subj = subjs.find(s => s.id === S.subjId);
  } catch(e) {}

  wrap.innerHTML = `
    <div style="margin-bottom:24px">
      <button class="btn btn-g btn-sm" id="uBack" style="margin-bottom:14px">← Voltar</button>
      <h1 style="font-family:var(--fh);font-weight:900;font-size:26px;letter-spacing:-.5px">⬆ Upload de Arquivo</h1>
      <p style="font-size:13px;margin-top:8px">
        <span style="color:${subj?.color};font-weight:600">${subj?.emoji} ${esc(subj?.name)}</span>
        ${subj?.sub ? `<span style="color:var(--mu)"> — ${esc(subj?.sub)}</span>` : ""}
      </p>
    </div>

    <div class="drop" id="dz">
      <input type="file" id="fi" accept=".pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.zip,.rar,.txt" style="display:none"/>
      <div class="drop-ico" id="dIco">☁️</div>
      <p class="drop-lbl" id="dLbl">Toque aqui para escolher o arquivo</p>
      <p class="drop-hint">PDF, Word, PowerPoint, Excel, ZIP… (máx. 50MB)</p>
    </div>

    <div id="progArea" style="display:none;margin-bottom:16px">
      <div class="prog-wrap"><div class="prog-bar" id="progBar" style="width:0%"></div></div>
      <p class="prog-msg" id="progMsg">Aguardando…</p>
    </div>

    <button class="btn btn-p btn-fw" id="btnUp" disabled>🚀 Enviar arquivo</button>
    <p id="upErr" style="color:#ff4d6d;font-size:13px;margin-top:10px;text-align:center;display:none"></p>`;

  page.appendChild(wrap); ROOT.appendChild(page);

  document.getElementById("uBack").onclick = () => go("subjectView");

  let selectedFile = null;
  const dz  = document.getElementById("dz");
  const fi  = document.getElementById("fi");
  const btn = document.getElementById("btnUp");
  const errEl = document.getElementById("upErr");

  function pick(file) {
    if (!file) return;
    selectedFile = file;
    document.getElementById("dIco").textContent = fileIcon(file.name);
    document.getElementById("dLbl").textContent = file.name + " (" + fmtSize(file.size) + ")";
    btn.disabled = false;
    errEl.style.display = "none";
    dz.classList.remove("drop-on");
  }

  dz.onclick = () => fi.click();
  fi.onchange = e => pick(e.target.files[0]);
  dz.ondragover  = e => { e.preventDefault(); dz.classList.add("drop-on"); };
  dz.ondragleave = () => dz.classList.remove("drop-on");
  dz.ondrop = e => { e.preventDefault(); pick(e.dataTransfer.files[0]); };

  btn.onclick = async () => {
    if (!selectedFile) return;
    btn.disabled = true;
    errEl.style.display = "none";

    const progArea = document.getElementById("progArea");
    const progBar  = document.getElementById("progBar");
    const progMsg  = document.getElementById("progMsg");

    progArea.style.display = "block";
    progBar.style.width = "2%";
    progMsg.textContent = "Conectando ao Supabase…";

    try {
      const result = await uploadToSupabase(selectedFile, pct => {
        progBar.style.width = pct + "%";
        progMsg.textContent = `Enviando… ${pct}%`;
      });

      progBar.style.width = "90%";
      progMsg.textContent = "Salvando no banco de dados…";

      await sbAddFile({
        id:          gid(),
        subject_id:  S.subjId,
        name:        selectedFile.name,
        url:         result.url,
        public_id:   result.publicId,
        size:        result.bytes || selectedFile.size,
        resume_link: "",
      });

      progBar.style.width = "100%";
      progMsg.textContent = "✅ Enviado com sucesso!";

      setTimeout(() => go("subjectView"), 800);

    } catch(e) {
      progArea.style.display = "none";
      progBar.style.width = "0%";
      btn.disabled = false;
      errEl.textContent = "❌ " + e.message;
      errEl.style.display = "block";
    }
  };
}

// VISUALIZADOR DE DOCUMENTOS (PDF.js nativo)
// ════════════════════════════════════════════════════
function docViewerBadge(name) {
  const n = (name || "").toLowerCase();
  if (n.endsWith(".pdf"))  return ["PDF",  "dvb-pdf"];
  if (n.endsWith(".docx") || n.endsWith(".doc")) return ["DOCX", "dvb-docx"];
  if (n.endsWith(".pptx") || n.endsWith(".ppt")) return ["PPT",  "dvb-ppt"];
  if (n.endsWith(".xlsx") || n.endsWith(".xls")) return ["XLS",  "dvb-xls"];
  return ["DOC", "dvb-other"];
}

function canPreview(name) {
  const n = (name || "").toLowerCase();
  return n.endsWith(".pdf") || n.endsWith(".docx") || n.endsWith(".doc") ||
         n.endsWith(".pptx") || n.endsWith(".ppt") ||
         n.endsWith(".xlsx") || n.endsWith(".xls");
}

function openDocViewer(fileName, fileUrl) {
  document.getElementById("_dv")?.remove();

  fileUrl = normalizeCloudinaryUrl(fileUrl);

  const [badgeText, badgeClass] = docViewerBadge(fileName);
  const n = fileName.toLowerCase();
  const isPdf  = n.endsWith(".pdf");
  const isDocx = n.endsWith(".docx") || n.endsWith(".doc");

  const ov = document.createElement("div");
  ov.className = "doc-viewer-ov";
  ov.id = "_dv";
  ov.innerHTML = `
    <div class="doc-viewer-bar">
      <span class="doc-viewer-badge ${badgeClass}">${badgeText}</span>
      <span class="doc-viewer-title">${esc(fileName)}</span>
      <a href="${esc(fileUrl)}" target="_blank" rel="noopener" class="btn btn-gr btn-sm" style="flex-shrink:0;font-size:12px;padding:5px 11px">⬇ Baixar</a>
      <button class="btn btn-g btn-sm" id="dvClose" style="flex-shrink:0;font-size:12px;padding:5px 11px">✕</button>
    </div>
    <div class="doc-viewer-body" id="dvBody">
      <div class="doc-viewer-status" id="dvStatus">
        <div class="spin"></div>
        <span id="dvStatusMsg">Carregando…</span>
      </div>
    </div>`;

  document.body.appendChild(ov);

  const dvClose = document.getElementById("dvClose");
  dvClose.onclick = () => { ov.remove(); };

  const escH = e => { if (e.key === "Escape") { ov.remove(); document.removeEventListener("keydown", escH); } };
  document.addEventListener("keydown", escH);

  const dvBody = document.getElementById("dvBody");

  // ── PDF com PDF.js ──────────────────────────────
  if (isPdf) {
    openPdfViewer(dvBody, fileUrl, fileName);
  }
  // ── DOCX com Mammoth ────────────────────────────
  else if (isDocx) {
    openDocxViewer(dvBody, fileUrl);
  }
  // ── Office Online (PPT / XLS) ───────────────────
  else {
    openOfficeViewer(dvBody, fileUrl);
  }
}

// ── PDF Viewer ──────────────────────────────────────
function openPdfViewer(container, url, fileName) {
  // Injeta estrutura
  container.insertAdjacentHTML("beforeend", `
    <div id="dv-pdf-wrap">
      <div id="dv-pdf-canvas-layer"></div>
    </div>
    <div id="dv-pdf-footer">
      <button class="dv-nav-btn" id="dvPrev" title="Página anterior">‹</button>
      <button class="dv-nav-btn" id="dvNext" title="Próxima página">›</button>
      <div id="dv-pdf-progress-track"><div id="dv-pdf-progress-fill" style="width:0%"></div></div>
      <span id="dv-pdf-page-lbl">1 / ?</span>
      <button class="dv-zoom-btn" id="dvZoomOut" title="Reduzir">−</button>
      <button class="dv-zoom-btn" id="dvZoomIn"  title="Ampliar">+</button>
    </div>`);

  // Carrega PDF.js dinamicamente
  if (!window.pdfjsLib) {
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload  = () => initPdf(url);
    s.onerror = () => showPdfError(container, url, fileName, "Falha ao carregar PDF.js");
    document.head.appendChild(s);
  } else {
    initPdf(url);
  }

  let pdfDoc = null;
  let curPage = 1;
  let scale   = 1.4;
  let rendering = false;

  // Estado de pan (arrastar)
  let panX = 0, panY = 0;
  let startPanX = 0, startPanY = 0;
  let isPanning = false;

  // Estado de pinch
  let lastPinchDist = 0;

  // Lista de proxies CORS para tentar em sequência
  const CORS_PROXIES = [
    u => u,
    u => "https://corsproxy.io/?" + encodeURIComponent(u),
    u => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u),
  ];
  let proxyIdx = 0;

  function initPdf(pdfUrl) {
    window.pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    tryLoadPdf(pdfUrl);
  }

  function tryLoadPdf(pdfUrl) {
    if (proxyIdx >= CORS_PROXIES.length) {
      fallbackIframe(pdfUrl);
      return;
    }

    const proxiedUrl = CORS_PROXIES[proxyIdx](pdfUrl);
    proxyIdx++;

    const st = document.getElementById("dvStatus");
    const msg = document.getElementById("dvStatusMsg");
    if (st) st.style.display = "flex";
    if (msg) msg.textContent = proxyIdx === 1 ? "Carregando PDF…" : "Tentando método alternativo…";

    let settled = false;
    const timeout = setTimeout(() => {
      if (!settled) { settled = true; tryLoadPdf(pdfUrl); }
    }, 12000);

    window.pdfjsLib.getDocument({ url: proxiedUrl, withCredentials: false, httpHeaders: {} })
      .promise
      .then(pdf => {
        if (settled) return;
        settled = true;
        clearTimeout(timeout);
        pdfDoc = pdf;
        hideStatus();
        updateNav();
        renderPage(curPage, true);
        setupInteractions();
      })
      .catch(() => {
        if (settled) return;
        settled = true;
        clearTimeout(timeout);
        tryLoadPdf(pdfUrl);
      });
  }

  function fallbackIframe(pdfUrl) {
    const body = document.getElementById("dvBody");
    if (!body) return;

    document.getElementById("dv-pdf-wrap")?.remove();
    document.getElementById("dv-pdf-footer")?.remove();

    const st = document.getElementById("dvStatus");
    if (st) {
      st.style.display = "flex";
      st.innerHTML = `<div class="spin"></div><span style="color:var(--mu2);font-size:12px">Abrindo visualizador externo…</span>`;
    }

    const iframe = document.createElement("iframe");
    iframe.style.cssText = "flex:1;width:100%;height:100%;border:none;display:block;";
    iframe.title = "Visualizador PDF";
    iframe.src = "https://docs.google.com/gview?url=" + encodeURIComponent(pdfUrl) + "&embedded=true";

    let loaded = false;
    iframe.onload = () => {
      loaded = true;
      if (st) st.style.display = "none";
    };

    setTimeout(() => {
      if (!loaded) {
        showPdfError(body, pdfUrl, fileName,
          "Não foi possível visualizar este PDF no navegador. Use o botão Baixar para abrir no seu leitor de PDF.");
      }
    }, 12000);

    body.appendChild(iframe);
  }

  function hideStatus() {
    const st = document.getElementById("dvStatus");
    if (st) st.style.display = "none";
  }

  function renderPage(num, resetPan = false) {
    if (rendering || !pdfDoc) return;
    rendering = true;

    if (resetPan) { panX = 0; panY = 0; }

    pdfDoc.getPage(num).then(page => {
      const wrap = document.getElementById("dv-pdf-wrap");
      if (!wrap) { rendering = false; return; }

      const vp = page.getViewport({ scale });
      const layer = document.getElementById("dv-pdf-canvas-layer");
      layer.innerHTML = "";

      const canvas  = document.createElement("canvas");
      const ctx     = canvas.getContext("2d");
      canvas.width  = vp.width;
      canvas.height = vp.height;
      layer.appendChild(canvas);

      // Centraliza o canvas
      const ww = wrap.clientWidth;
      const wh = wrap.clientHeight;
      const initX = Math.max(0, (ww - vp.width)  / 2);
      const initY = Math.max(0, (wh - vp.height) / 2);
      panX = resetPan ? initX : panX;
      panY = resetPan ? initY : panY;
      applyTransform();

      page.render({ canvasContext: ctx, viewport: vp }).promise.then(() => {
        rendering = false;
        updateProgress();
      });
    });
  }

  function applyTransform() {
    const layer = document.getElementById("dv-pdf-canvas-layer");
    if (layer) layer.style.transform = `translate(${panX}px,${panY}px)`;
  }

  function updateNav() {
    const prev = document.getElementById("dvPrev");
    const next = document.getElementById("dvNext");
    if (prev) prev.disabled = curPage <= 1;
    if (next) next.disabled = curPage >= (pdfDoc?.numPages || 1);
  }

  function updateProgress() {
    const total = pdfDoc?.numPages || 1;
    const pct   = ((curPage - 1) / Math.max(total - 1, 1)) * 100;
    const fill  = document.getElementById("dv-pdf-progress-fill");
    const lbl   = document.getElementById("dv-pdf-page-lbl");
    if (fill) fill.style.width = pct + "%";
    if (lbl)  lbl.textContent  = `${curPage} / ${total}`;
    updateNav();
  }

  function goPage(n) {
    if (!pdfDoc) return;
    const clamped = Math.max(1, Math.min(pdfDoc.numPages, n));
    if (clamped === curPage) return;
    curPage = clamped;
    renderPage(curPage, true);
  }

  function setupInteractions() {
    const wrap = document.getElementById("dv-pdf-wrap");
    if (!wrap) return;

    // Botões de navegação
    document.getElementById("dvPrev").onclick = () => goPage(curPage - 1);
    document.getElementById("dvNext").onclick = () => goPage(curPage + 1);

    // Zoom focal: mantém o ponto (px, py) fixo na tela ao mudar escala
    function applyZoom(newScale, px, py) {
      newScale = Math.max(0.6, Math.min(4, newScale));
      const ratio = newScale / scale;
      panX = px - ratio * (px - panX);
      panY = py - ratio * (py - panY);
      scale = newScale;
      renderPage(curPage, false);
    }

    // Botões de zoom (zoom focal no centro da tela)
    document.getElementById("dvZoomIn").onclick = () => {
      const wrap = document.getElementById("dv-pdf-wrap");
      applyZoom(scale * 1.25, wrap.clientWidth / 2, wrap.clientHeight / 2);
    };
    document.getElementById("dvZoomOut").onclick = () => {
      const wrap = document.getElementById("dv-pdf-wrap");
      applyZoom(scale * 0.8, wrap.clientWidth / 2, wrap.clientHeight / 2);
    };

    // Barra de progresso clicável
    document.getElementById("dv-pdf-progress-track").onclick = e => {
      if (!pdfDoc) return;
      const rect = e.currentTarget.getBoundingClientRect();
      const pct  = (e.clientX - rect.left) / rect.width;
      goPage(Math.round(1 + pct * (pdfDoc.numPages - 1)));
    };

    // ── Touch: pan + pinch + swipe ──────────────
    let touchStartX = 0, touchStartY = 0;
    let touchPanX = 0, touchPanY = 0;
    let swipeStartX = 0;

    wrap.addEventListener("touchstart", e => {
      if (e.touches.length === 1) {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        touchPanX   = panX;
        touchPanY   = panY;
        swipeStartX = e.touches[0].clientX;
      } else if (e.touches.length === 2) {
        lastPinchDist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY);
      }
    }, { passive: true });

    wrap.addEventListener("touchmove", e => {
      if (e.touches.length === 1) {
        const dx = e.touches[0].clientX - touchStartX;
        const dy = e.touches[0].clientY - touchStartY;
        panX = touchPanX + dx;
        panY = touchPanY + dy;
        applyTransform();
      } else if (e.touches.length === 2) {
        e.preventDefault();
        const dist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY);
        const factor = dist / lastPinchDist;
        lastPinchDist = dist;

        // Ponto médio dos dois dedos como focal point
        const rect = wrap.getBoundingClientRect();
        const mx = ((e.touches[0].clientX + e.touches[1].clientX) / 2) - rect.left;
        const my = ((e.touches[0].clientY + e.touches[1].clientY) / 2) - rect.top;
        applyZoom(scale * factor, mx, my);
      }
    }, { passive: false });

    wrap.addEventListener("touchend", e => {
      // Swipe horizontal para trocar página (só se não houve pinch)
      if (e.changedTouches.length === 1 && e.touches.length === 0) {
        const dx = e.changedTouches[0].clientX - swipeStartX;
        if (Math.abs(dx) > 60 && scale <= 1.5) {
          if (dx < 0) goPage(curPage + 1);
          else        goPage(curPage - 1);
        }
      }
    }, { passive: true });

    // ── Mouse: pan ──────────────────────────────
    wrap.addEventListener("mousedown", e => {
      isPanning = true;
      startPanX = e.clientX - panX;
      startPanY = e.clientY - panY;
      wrap.classList.add("grabbing");
    });
    window.addEventListener("mousemove", e => {
      if (!isPanning) return;
      panX = e.clientX - startPanX;
      panY = e.clientY - startPanY;
      applyTransform();
    });
    window.addEventListener("mouseup", () => {
      isPanning = false;
      wrap.classList.remove("grabbing");
    });

    // ── Scroll do mouse: zoom focal no cursor ───────────
    wrap.addEventListener("wheel", e => {
      e.preventDefault();
      const rect = wrap.getBoundingClientRect();
      const px = e.clientX - rect.left;
      const py = e.clientY - rect.top;
      const factor = e.deltaY < 0 ? 1.1 : 0.9;
      applyZoom(scale * factor, px, py);
    }, { passive: false });

    // ── Teclado ─────────────────────────────────
    const keyH = e => {
      if (!document.getElementById("_dv")) { document.removeEventListener("keydown", keyH); return; }
      if (e.key === "ArrowRight" || e.key === "ArrowDown")  goPage(curPage + 1);
      if (e.key === "ArrowLeft"  || e.key === "ArrowUp")    goPage(curPage - 1);
      if (e.key === "+" || e.key === "=") { const w = document.getElementById("dv-pdf-wrap"); applyZoom(scale * 1.25, w.clientWidth/2, w.clientHeight/2); }
      if (e.key === "-")                  { const w = document.getElementById("dv-pdf-wrap"); applyZoom(scale * 0.8,  w.clientWidth/2, w.clientHeight/2); }
    };
    document.addEventListener("keydown", keyH);
  }
}

// ── DOCX Viewer ─────────────────────────────────────
function openDocxViewer(container, url) {
  container.insertAdjacentHTML("beforeend", `<div id="dv-docx-out"></div>`);

  // Timeout de segurança para o fetch do DOCX
  const controller = new AbortController();
  const docxTimeout = setTimeout(() => controller.abort(), 20000);

  fetch(url, { signal: controller.signal })
    .then(r => {
      clearTimeout(docxTimeout);
      if (!r.ok) throw new Error("HTTP " + r.status + " — arquivo não acessível");
      return r.arrayBuffer();
    })
    .then(buf => mammoth.convertToHtml({ arrayBuffer: buf }))
    .then(result => {
      const out = document.getElementById("dv-docx-out");
      if (!out) return;
      out.innerHTML = result.value || "<p><em>Documento vazio.</em></p>";
      const st = document.getElementById("dvStatus");
      if (st) st.style.display = "none";
    })
    .catch(err => {
      clearTimeout(docxTimeout);
      const st = document.getElementById("dvStatus");
      const isAbort = err.name === "AbortError";
      const msg = isAbort ? "Tempo esgotado ao carregar o documento." : err.message;
      if (st) st.innerHTML = `
        <span style="font-size:32px">⚠️</span>
        <span style="color:#f87171;max-width:260px;text-align:center">${esc(msg)}</span>
        <a href="${esc(url)}" download class="btn btn-gr btn-sm" style="pointer-events:all">⬇ Baixar arquivo</a>`;
    });
}

function getProgress() {
  try { return JSON.parse(localStorage.getItem("sn_progress") || "{}"); } catch { return {}; }
}
function saveProgress(p) {
  localStorage.setItem("sn_progress", JSON.stringify(p));
}
function recordStudy(fileName, type) {
  const p = getProgress();
  const key = fileName;
  if (!p[key]) p[key] = { fileName, quizzes: 0, flashcards: 0, exercises: 0, lastStudied: null, score: 0, total: 0 };
  p[key][type] = (p[key][type] || 0) + 1;
  p[key].lastStudied = new Date().toISOString();
  saveProgress(p);
}
function recordQuizResult(fileName, correct, total) {
  const p = getProgress();
  if (!p[fileName]) p[fileName] = { fileName, quizzes: 0, flashcards: 0, exercises: 0, lastStudied: null, score: 0, total: 0 };
  p[fileName].score = (p[fileName].score || 0) + correct;
  p[fileName].total = (p[fileName].total || 0) + total;
  p[fileName].quizzes = (p[fileName].quizzes || 0) + 1;
  p[fileName].lastStudied = new Date().toISOString();
  saveProgress(p);
}

function progressView() {
  const page = document.createElement("div"); page.className = "page";
  page.appendChild(mkHdr());
  const wrap = document.createElement("main"); wrap.className = "wrap";

  const p = getProgress();
  const entries = Object.values(p);
  const totalSessions = entries.reduce((a, e) => a + (e.quizzes||0) + (e.flashcards||0) + (e.exercises||0), 0);
  const totalCorrect = entries.reduce((a, e) => a + (e.score||0), 0);
  const totalQ = entries.reduce((a, e) => a + (e.total||0), 0);
  const avgScore = totalQ > 0 ? Math.round(totalCorrect / totalQ * 100) : 0;

  wrap.innerHTML = `
    <div style="margin-bottom:24px">
      <button class="btn btn-g btn-sm" id="prBack" style="margin-bottom:14px">← Voltar</button>
      <h1 style="font-family:var(--fh);font-weight:900;font-size:26px;letter-spacing:-.5px">📊 Meu Progresso</h1>
    </div>
    <div class="prog-stats" style="margin-bottom:20px">
      <div class="prog-stat"><div class="prog-stat-num">${entries.length}</div><div class="prog-stat-lbl">Materiais estudados</div></div>
      <div class="prog-stat"><div class="prog-stat-num">${totalSessions}</div><div class="prog-stat-lbl">Sessões de estudo</div></div>
      <div class="prog-stat"><div class="prog-stat-num">${avgScore}%</div><div class="prog-stat-lbl">Média nos quizzes</div></div>
    </div>
    ${entries.length === 0 ? `<div class="empty"><div style="font-size:48px">📚</div><p class="empty-title">Nenhum estudo ainda</p><p class="empty-sub">Use o botão ✨ Estudar com IA em qualquer arquivo para começar!</p></div>` : ""}
    <div id="progList" style="display:flex;flex-direction:column;gap:10px"></div>`;

  page.appendChild(wrap); ROOT.appendChild(page);
  document.getElementById("prBack").onclick = () => history.length > 1 ? history.back() : go("home");

  const list = document.getElementById("progList");
  entries.sort((a,b) => new Date(b.lastStudied) - new Date(a.lastStudied)).forEach(e => {
    const pct = e.total > 0 ? Math.round(e.score / e.total * 100) : 0;
    const d = document.createElement("div"); d.className = "prog-subject";
    d.innerHTML = `
      <div class="prog-subject-name">
        <span>${esc(e.fileName)}</span>
        <span style="color:var(--ac2);font-size:13px">${e.total > 0 ? pct + "% quiz" : ""}</span>
      </div>
      <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${Math.min(pct,100)}%"></div></div>
      <div style="display:flex;gap:14px;font-size:12px;color:var(--mu)">
        <span>🃏 ${e.flashcards||0} flashcards</span>
        <span>📝 ${e.exercises||0} exercícios</span>
        <span>❓ ${e.quizzes||0} quizzes</span>
        ${e.lastStudied ? `<span style="margin-left:auto">${fmtDate(e.lastStudied)}</span>` : ""}
      </div>`;
    list.appendChild(d);
  });
}

// Cache de sessão: evita re-gerar para o mesmo arquivo
const AI_CACHE = {};

function getApiKey() {
  return window._sn_api_key || "";
}

async function loadApiKey() {
  try {
    const key = await sbGetConfig("claude_api_key");
    if (key) window._sn_api_key = key;
  } catch(e) {}
}

async function extractTextFromUrl(url, fileName) {
  const n = fileName.toLowerCase();

  if (n.endsWith(".pdf")) {
    // Carrega PDF.js se necessário
    if (!window.pdfjsLib) {
      await new Promise((res, rej) => {
        const s = document.createElement("script");
        s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }
    window.pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    const pdf = await window.pdfjsLib.getDocument({ url, withCredentials: false }).promise;
    let text = "";
    const maxPages = Math.min(pdf.numPages, 30); // limita a 30 páginas
    for (let i = 1; i <= maxPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(it => it.str).join(" ") + "\n";
    }
    return text.trim().slice(0, 12000); // limita tokens
  }

  if (n.endsWith(".docx") || n.endsWith(".doc")) {
    const buf = await fetch(url).then(r => r.arrayBuffer());
    const result = await mammoth.extractRawText({ arrayBuffer: buf });
    return result.value.trim().slice(0, 12000);
  }

  // Para PPT/XLS não conseguimos extrair texto no browser — usa só o nome
  return `Arquivo: ${fileName}\n(Conteúdo não extraível automaticamente — baseie o material no título do arquivo)`;
}

async function callClaude(text, fileName) {
  const key = getApiKey();
  if (!key) throw new Error("NO_KEY");

  const prompt = `Você é um assistente educacional especialista em criar materiais de estudo em português brasileiro.

Analise o seguinte conteúdo de um documento chamado "${fileName}" e gere material de estudo completo.

CONTEÚDO DO DOCUMENTO:
${text}

Responda APENAS com um JSON válido neste formato exato (sem markdown, sem texto fora do JSON):
{
  "concepts": [
    {"name": "Nome do conceito", "definition": "Definição clara e objetiva"}
  ],
  "flashcards": [
    {"question": "Pergunta", "answer": "Resposta"}
  ],
  "exercises": [
    {"problem": "Enunciado do exercício", "answer": "Resposta/solução completa"}
  ],
  "quiz": [
    {"question": "Pergunta", "options": ["A) opção", "B) opção", "C) opção", "D) opção"], "correct": 0, "explanation": "Por que esta é a resposta correta"}
  ]
}

Regras:
- Gere exatamente: 5 conceitos-chave, 8 flashcards, 4 exercícios, 6 questões de quiz
- Tudo em português brasileiro
- Baseie-se APENAS no conteúdo fornecido
- correct é o índice (0-3) da opção correta no array options
- Seja didático e claro`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": key, "anthropic-version": "2023-06-01" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 4000,
      messages: [{ role: "user", content: prompt }]
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || "Erro na API: " + res.status);
  }

  const data = await res.json();
  const raw = data.content[0].text.trim();
  // Remove possíveis marcadores de código
  const clean = raw.replace(/^```json\s*/,"").replace(/```\s*$/,"").trim();
  return JSON.parse(clean);
}

async function generateAIMaterial(fileName, fileUrl) {
  const step = id => {
    ["step1","step2","step3","step4"].forEach((s,i) => {
      const el = document.getElementById(s);
      if (!el) return;
      const num = parseInt(id.replace("step",""));
      const cur = parseInt(s.replace("step",""));
      el.className = "ai-step" + (cur < num ? " done" : cur === num ? " active" : "");
      if (cur < num) el.querySelector(".ai-step-ico").textContent = "✓";
    });
  };

  try {
    step("step1");
    const text = await extractTextFromUrl(fileUrl, fileName);

    step("step2");
    const data = await callClaude(text, fileName);

    step("step3");
    await new Promise(r => setTimeout(r, 400)); // animação

    step("step4");
    await new Promise(r => setTimeout(r, 300));

    AI_CACHE[fileName] = data;
    renderAIContent(data, fileName);

  } catch(err) {
    const loading = document.getElementById("aiLoading");
    if (!loading) return;
    if (err.message === "NO_KEY") {
      loading.innerHTML = `<div class="api-key-prompt"><div style="font-size:40px">🔑</div><p style="font-family:var(--fh);font-weight:900;font-size:18px">Chave não configurada</p><p>O ADM precisa adicionar a chave da API nas ⚙️ Configurações.</p></div>`;
    } else {
      loading.innerHTML = `<div style="text-align:center;padding:32px"><div style="font-size:40px">⚠️</div><p style="color:#f87171;margin-top:12px;font-size:14px">${esc(err.message)}</p><button class="btn btn-p" style="margin-top:16px" onclick="generateAIMaterial('${esc(fileName)}','${esc(fileUrl)}')">Tentar novamente</button></div>`;
    }
  }
}

  body.innerHTML = `

    <div class="ai-section on" id="tab-concepts">

      ${(data.concepts||[]).map(c => `
        <div class="concept-item">
          <div class="concept-dot"></div>
          <div><div class="concept-name">${esc(c.name)}</div><div class="concept-def">${esc(c.definition)}</div></div>
        </div>`).join("")}
    </div>

    <!-- FLASHCARDS -->

      <div class="ai-card"><div class="ai-card-title">🃏 Flashcards — toque para revelar</div></div>
      <div class="fc-grid">
        ${(data.flashcards||[]).map((fc,i) => `
          <div class="fc" onclick="this.classList.toggle('open')">
            <div class="fc-q">${esc(fc.question)}</div>
            <div class="fc-a">${esc(fc.answer)}</div>
            <div class="fc-hint">Toque para ver a resposta</div>
          </div>`).join("")}
      </div>
    </div>

    <!-- EXERCÍCIOS -->
    <div class="ai-section" id="tab-exercises">
      <div class="ai-card"><div class="ai-card-title">📝 Exercícios Práticos</div></div>
      ${(data.exercises||[]).map((ex,i) => `
        <div class="ex-item">
          <div class="ex-num">Exercício ${i+1}</div>
          <div class="ex-txt">${esc(ex.problem)}</div>
          <button class="btn btn-g btn-sm" onclick="const a=this.nextElementSibling;a.classList.toggle('on');this.textContent=a.classList.contains('on')?'Ocultar resposta':'Ver resposta'">Ver resposta</button>
          <div class="ex-ans">${esc(ex.answer)}</div>
        </div>`).join("")}
    </div>

    <!-- QUIZ -->
    <div class="ai-section" id="tab-quiz">
      <div class="ai-card"><div class="ai-card-title" id="quizTitle">❓ Quiz — ${(data.quiz||[]).length} questões</div></div>
      <div id="quizContainer"></div>
      <div id="quizScore" class="quiz-score" style="display:none"></div>

  // Tabs
  tabs.querySelectorAll(".ai-tab").forEach(t => {

function renderQuiz(questions, fileName) {
  const container = document.getElementById("quizContainer");
  const scoreEl = document.getElementById("quizScore");
  if (!container || container.children.length > 0) return;

  let answered = 0;
  let correct = 0;

  questions.forEach((q, qi) => {
    const div = document.createElement("div"); div.className = "quiz-q";
    div.innerHTML = `
      <div class="quiz-q-txt">${qi+1}. ${esc(q.question)}</div>
      <div class="quiz-opts">
        ${(q.options||[]).map((opt,oi) => `<button class="quiz-opt" data-qi="${qi}" data-oi="${oi}">${esc(opt)}</button>`).join("")}
      </div>
      <div class="quiz-exp" id="qexp-${qi}">${esc(q.explanation||"")}</div>`;
    container.appendChild(div);

    div.querySelectorAll(".quiz-opt").forEach(btn => {
      btn.onclick = () => {
        if (div.dataset.answered) return;
        div.dataset.answered = "1";
        answered++;
        const chosen = parseInt(btn.dataset.oi);
        const isCorrect = chosen === q.correct;
        if (isCorrect) correct++;
        div.querySelectorAll(".quiz-opt").forEach((b, bi) => {
          b.disabled = true;
          if (bi === q.correct) b.classList.add("correct");
          else if (bi === chosen) b.classList.add("wrong");
        });
        document.getElementById(`qexp-${qi}`)?.classList.add("on");
        if (answered === questions.length) {
          recordQuizResult(fileName, correct, questions.length);
          setTimeout(() => {
            const pct = Math.round(correct / questions.length * 100);
            const emoji = pct >= 80 ? "🏆" : pct >= 60 ? "👍" : "📚";
            scoreEl.style.display = "block";
            scoreEl.innerHTML = `
              <div style="font-size:32px">${emoji}</div>
              <div class="quiz-score-num">${pct}%</div>
              <div style="font-size:14px;color:var(--mu2);margin-top:4px">${correct} de ${questions.length} corretas</div>
              <button class="btn btn-g btn-sm" style="margin-top:12px" onclick="document.getElementById('quizContainer').innerHTML='';document.getElementById('quizScore').style.display='none';renderQuiz(${JSON.stringify(questions).replace(/</g,'\\u003c')},'${esc(fileName)}')">🔄 Refazer</button>`;
            scoreEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
          }, 400);
        }
      };
    });
  });
}
