<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#080812"/>
<title>StudyNet</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080812;--sf:#111122;--sf2:#161628;
  --bd:#1c1c35;--bd2:#252540;
  --tx:#ededf5;--mu:#5a5a80;--mu2:#8888aa;
  --ac:#634cdc;--ac2:#38b69b;
  --fh:'Fraunces',serif;--fb:'DM Sans',sans-serif;
  --r:13px;--rl:20px;
}
html,body{min-height:100vh}
body{background:var(--bg);color:var(--tx);font-family:var(--fb);font-size:15px;line-height:1.6;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 15% 0%,rgba(99,76,220,.08),transparent),radial-gradient(ellipse 50% 40% at 85% 100%,rgba(56,182,155,.06),transparent);pointer-events:none;z-index:0}
#app{position:relative;z-index:1;min-height:100vh}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:9px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade{from{opacity:0}to{opacity:1}}
.page{min-height:100vh;display:flex;flex-direction:column}
.wrap{max-width:860px;margin:0 auto;padding:32px 18px;width:100%;flex:1}
.wrap-sm{max-width:540px}
.ctr{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;padding:24px;text-align:center}
.hdr{background:rgba(8,8,18,.92);backdrop-filter:blur(18px);border-bottom:1px solid var(--bd);padding:0 18px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:9px;color:var(--tx)}
.logo-mk{width:32px;height:32px;background:linear-gradient(135deg,var(--ac),var(--ac2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-tx{font-family:var(--fh);font-weight:900;font-size:18px;letter-spacing:-.4px}
.hdr-r{display:flex;align-items:center;gap:8px}
.badge{background:rgba(99,76,220,.15);color:#a48fff;border:1px solid rgba(99,76,220,.3);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600;letter-spacing:.7px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:var(--r);font-family:var(--fb);font-weight:600;font-size:14px;cursor:pointer;transition:all .17s;white-space:nowrap;text-decoration:none;padding:10px 20px}
.btn:active{transform:scale(.96)}.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-p{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;box-shadow:0 3px 18px rgba(99,76,220,.28)}
.btn-g{background:var(--sf2);color:var(--mu2);border:1px solid var(--bd2)}.btn-g:hover{color:var(--tx)}
.btn-d{background:rgba(255,77,109,.1);color:#ff4d6d;border:1px solid rgba(255,77,109,.3)}
.btn-gr{background:rgba(56,182,155,.1);color:var(--ac2);border:1.5px solid var(--ac2)}
.btn-sm{padding:6px 13px;font-size:13px}.btn-fw{width:100%}
.inp,.sel{width:100%;background:var(--sf);border:1.5px solid var(--bd2);border-radius:var(--r);padding:11px 14px;color:var(--tx);font-family:var(--fb);font-size:14px;outline:none;transition:border-color .18s;appearance:none}
.inp:focus,.sel:focus{border-color:var(--ac)}.inp::placeholder{color:var(--mu)}
.lbl{display:block;font-size:12px;color:var(--mu2);font-weight:600;margin-bottom:6px}
.gate-pg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 25% 35%,rgba(99,76,220,.1),transparent 55%),radial-gradient(ellipse at 75% 70%,rgba(56,182,155,.07),transparent 50%),var(--bg)}
.gate-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:40px 32px;width:100%;max-width:400px;display:flex;flex-direction:column;align-items:center;gap:14px;animation:up .4s ease;box-shadow:0 10px 50px rgba(0,0,0,.5)}
.gate-logo{width:60px;height:60px;background:linear-gradient(135deg,var(--ac),var(--ac2));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px}
.gate-title{font-family:var(--fh);font-weight:900;font-size:30px;letter-spacing:-.8px}
.gate-sub{color:var(--mu);font-size:13px}
.dvd{width:100%;display:flex;align-items:center;gap:10px;color:var(--mu);font-size:11px}
.dvd::before,.dvd::after{content:"";flex:1;height:1px;background:var(--bd)}
.gate-row{display:flex;gap:8px;width:100%}
.gate-err{color:#ff4d6d;font-size:13px;text-align:center;animation:up .2s ease}
.hero{margin-bottom:28px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.hero-title{font-family:var(--fh);font-weight:900;font-size:30px;letter-spacing:-.7px;line-height:1.15}
.hero-sub{color:var(--mu2);font-size:13px;margin-top:5px}
.subj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.subj-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .18s;animation:up .3s ease both}
.subj-card:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,.35)}
.subj-top{height:3px}
.subj-body{padding:20px}
.subj-ico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:11px}
.subj-name{font-family:var(--fh);font-weight:700;font-size:15px;line-height:1.3;margin-bottom:3px}
.subj-sub{font-size:11px;color:var(--mu);margin-bottom:12px;min-height:14px}
.subj-ft{display:flex;align-items:center;justify-content:space-between}
.subj-chip{font-size:11px;font-weight:600;padding:3px 11px;border-radius:99px}
.subj-adm{display:flex;gap:5px}
.subj-hdr{margin-bottom:24px}
.subj-title{font-family:var(--fh);font-weight:900;font-size:24px;letter-spacing:-.5px;line-height:1.2;margin-bottom:4px}
.subj-meta{font-size:13px;color:var(--mu)}
.file-list{display:flex;flex-direction:column;gap:12px}
.file-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;animation:up .25s ease both}
.file-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;gap:12px;flex-wrap:wrap}
.file-info{display:flex;align-items:center;gap:12px;min-width:0;flex:1}
.file-ico{font-size:24px;flex-shrink:0}
.file-name{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-date{font-size:11px;color:var(--mu);margin-top:2px}
.file-acts{display:flex;gap:7px;flex-shrink:0;flex-wrap:wrap}
.link-zone{padding:0 18px 15px;border-top:1px solid var(--bd)}
.link-lbl{font-size:11px;color:var(--mu2);font-weight:600;padding:10px 0 7px;display:flex;align-items:center;gap:5px}
.link-box{display:flex;align-items:center;gap:8px;background:rgba(99,76,220,.07);border:1px solid rgba(99,76,220,.2);border-radius:var(--r);padding:9px 13px}
.link-box a{color:#a48fff;font-size:13px;text-decoration:none;flex:1;word-break:break-all}
.link-box a:hover{text-decoration:underline}
.link-edit-row{display:flex;gap:7px}
.link-edit-row .inp{font-size:13px;padding:8px 12px}
.link-empty{font-size:13px;color:var(--mu);font-style:italic}
.drop{border:2px dashed var(--bd2);border-radius:var(--rl);padding:38px 18px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:16px;user-select:none}
.drop:hover,.drop-on{border-color:var(--ac);background:rgba(99,76,220,.05)}
.drop-ico{font-size:40px;margin-bottom:10px}
.drop-lbl{font-family:var(--fh);font-weight:700;font-size:16px;margin-bottom:3px}
.drop-hint{font-size:13px;color:var(--mu)}
.prog-wrap{height:6px;background:var(--bd);border-radius:99px;overflow:hidden;margin-bottom:8px}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));border-radius:99px;transition:width .25s}
.prog-msg{font-size:13px;color:var(--mu);text-align:center}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:18px;animation:fade .2s ease}
.modal{background:var(--sf);border:1px solid var(--bd2);border-radius:var(--rl);padding:28px 24px;width:100%;max-width:420px;display:flex;flex-direction:column;gap:13px;box-shadow:0 14px 50px rgba(0,0,0,.6);animation:up .22s ease}
.modal-title{font-family:var(--fh);font-weight:900;font-size:20px;letter-spacing:-.4px}
.modal-row{display:flex;gap:8px}
.modal-row .btn{flex:1}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px}
.emj{background:var(--sf2);border:2px solid transparent;border-radius:8px;padding:6px;font-size:19px;cursor:pointer;transition:all .14s;text-align:center}
.emj:hover,.emj-on{border-color:var(--ac);background:rgba(99,76,220,.15)}
.clr-grid{display:flex;flex-wrap:wrap;gap:7px}
.clr{width:30px;height:30px;border-radius:8px;border:3px solid transparent;cursor:pointer;transition:all .14s}
.clr-on{border-color:#fff;transform:scale(1.12)}
.set-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rl);padding:24px;display:flex;flex-direction:column;gap:11px}
.set-card h3{font-family:var(--fh);font-weight:700;font-size:16px}
.set-card p{color:var(--mu);font-size:13px}
.ok-msg{color:var(--ac2);font-size:13px;animation:up .2s ease}
.empty{text-align:center;padding:52px 20px;display:flex;flex-direction:column;align-items:center;gap:12px}
.empty-title{font-family:var(--fh);font-weight:700;font-size:19px;color:var(--mu2)}
.empty-sub{color:var(--mu);max-width:300px;font-size:13px}
.spin{width:34px;height:34px;border:3px solid var(--bd2);border-top-color:var(--ac);border-radius:50%;animation:spin .65s linear infinite}
@media(max-width:600px){
  .wrap{padding:22px 14px}.hdr{padding:0 14px}
  .subj-grid{grid-template-columns:1fr}
  .gate-card{padding:32px 20px}.hero-title{font-size:24px}
  .modal{padding:24px 18px}
}
</style>
</head>

<script>
"use strict";

// ═══════════════════════════════════════════════════
// CONFIGURAÇÕES
// ═══════════════════════════════════════════════════
const CLOUD_NAME    = "dzaogzywr";
const UPLOAD_PRESET = "studynet";

const SUPA_URL = "https://fihoawkedcgwmvfnrntz.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpaG9hd2tlZGNnd212Zm5ybnR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMTk5NTksImV4cCI6MjA4ODg5NTk1OX0.-5M_SzvuluMo60-mOhnKYmJGH0B5IzypxB-5q8WCJmg";

// ── Supabase REST helpers ─────────────────────────
async function sbFetch(path, opts = {}) {
  const res = await fetch(SUPA_URL + "/rest/v1/" + path, {
    headers: {
      "apikey":        SUPA_KEY,
      "Authorization": "Bearer " + SUPA_KEY,
      "Content-Type":  "application/json",
      "Prefer":        opts.prefer || "return=representation",
      ...opts.headers,
    },
    method: opts.method || "GET",
    body:   opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || "Erro Supabase " + res.status);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

// ── CRUD Subjects ─────────────────────────────────
async function sbGetSubjects() {
  return sbFetch("subjects?select=*&order=created_at.asc");
}
async function sbAddSubject(s) {
  return sbFetch("subjects", { method: "POST", body: s });
}
async function sbEditSubject(id, p) {
  return sbFetch("subjects?id=eq." + id, { method: "PATCH", body: p });
}
async function sbDelSubject(id) {
  return sbFetch("subjects?id=eq." + id, { method: "DELETE", prefer: "return=minimal", headers: { "Prefer": "return=minimal" } });
}

// ── CRUD Files ────────────────────────────────────
async function sbGetFiles(subjectId) {
  return sbFetch("files?subject_id=eq." + subjectId + "&select=*&order=uploaded_at.asc");
}
async function sbAddFile(f) {
  return sbFetch("files", { method: "POST", body: f });
}
async function sbEditFile(id, p) {
  return sbFetch("files?id=eq." + id, { method: "PATCH", body: p });
}
async function sbDelFile(id) {
  return sbFetch("files?id=eq." + id, { method: "DELETE", headers: { "Prefer": "return=minimal" } });
}

// ── Config (senha ADM) ────────────────────────────
async function sbGetConfig(key) {
  const rows = await sbFetch("config?key=eq." + key + "&select=value");
  return rows[0]?.value || null;
}
async function sbSetConfig(key, value) {
  return sbFetch("config", {
    method: "POST",
    body: { key, value },
    headers: { "Prefer": "resolution=merge-duplicates,return=minimal" },
    prefer: "resolution=merge-duplicates",
  });
}

// ── Hash SHA-256 ──────────────────────────────────
async function sha256(text) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

// ── Cloudinary upload ─────────────────────────────
function uploadToCloudinary(file, onProgress) {
  return new Promise(function(resolve, reject) {
    const allowedExts = [".pdf",".doc",".docx",".ppt",".pptx",".xls",".xlsx",".zip",".rar",".txt"];
    const ext = "." + file.name.split(".").pop().toLowerCase();
    if (!allowedExts.includes(ext)) { reject(new Error("Tipo não permitido: " + ext)); return; }
    if (file.size > 50 * 1024 * 1024) { reject(new Error("Arquivo muito grande. Máximo: 50MB")); return; }

    const fd = new FormData();
    fd.append("upload_preset", UPLOAD_PRESET);
    fd.append("file", file);

    const xhr = new XMLHttpRequest();
    xhr.upload.onprogress = e => {
      if (e.lengthComputable && onProgress) onProgress(Math.round(e.loaded / e.total * 100));
    };
    xhr.onload = () => {
      if (xhr.status === 200) {
        const d = JSON.parse(xhr.responseText);
        resolve({ url: d.secure_url, publicId: d.public_id, bytes: d.bytes });
      } else {
        let msg = "Erro no upload (status " + xhr.status + ")";
        try { msg = JSON.parse(xhr.responseText).error.message || msg; } catch(e) {}
        reject(new Error(msg));
      }
    };
    xhr.onerror = () => reject(new Error("Falha de conexão com Cloudinary"));
    xhr.open("POST", "https://api.cloudinary.com/v1_1/" + CLOUD_NAME + "/auto/upload");
    xhr.send(fd);
  });
}

// ── Helpers ───────────────────────────────────────
function gid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function esc(s) { return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmtDate(iso) { try { return new Date(iso).toLocaleDateString("pt-BR"); } catch { return ""; } }
function fmtSize(b) {
  if (!b) return "";
  if (b < 1024) return b + " B";
  if (b < 1048576) return Math.round(b/1024) + " KB";
  return (b/1048576).toFixed(1) + " MB";
}
function fileIcon(name) {
  const n = (name||"").toLowerCase();
  if (n.endsWith(".pdf")) return "📄";
  if (n.endsWith(".doc") || n.endsWith(".docx")) return "📝";
  if (n.endsWith(".ppt") || n.endsWith(".pptx")) return "📊";
  if (n.endsWith(".xls") || n.endsWith(".xlsx")) return "📈";
  if (n.endsWith(".zip") || n.endsWith(".rar")) return "🗜";
  if (n.endsWith(".txt")) return "📃";
  return "📎";
}

// ── Estado global ─────────────────────────────────
const S = {
  role:   sessionStorage.getItem("sn_role") || null,
  subjId: null,
};

// ── Render engine ─────────────────────────────────
const ROOT = document.getElementById("app");

function go(view, patch = {}) {
  Object.assign(S, patch);
  ROOT.innerHTML = "";
  window.scrollTo(0, 0);
  ({ gate, home, subjectView, uploadView, settingsView })[view]?.();
}

// ── Modal ─────────────────────────────────────────
function openModal(html, onMount) {
  document.getElementById("_ov")?.remove();
  const ov = document.createElement("div");
  ov.className = "ov"; ov.id = "_ov";
  ov.innerHTML = `<div class="modal">${html}</div>`;
  ov.onclick = e => { if (e.target === ov) closeModal(); };
  document.body.appendChild(ov);
  onMount?.(ov.querySelector(".modal"));
}
function closeModal() { document.getElementById("_ov")?.remove(); }

// ── Header ────────────────────────────────────────
function mkHdr() {
  const h = document.createElement("header"); h.className = "hdr";
  h.innerHTML = `
    <button class="logo" id="hL">
      <div class="logo-mk">📚</div>
      <span class="logo-tx">StudyNet</span>
    </button>
    <div class="hdr-r">
      ${S.role==="adm" ? `<span class="badge">ADM</span><button class="btn btn-g btn-sm" id="hSet">⚙️</button>` : ""}
      <button class="btn btn-g btn-sm" id="hSair">Sair</button>
    </div>`;
  h.querySelector("#hL").onclick = () => go("home");
  h.querySelector("#hSet")?.addEventListener("click", () => go("settingsView"));
  h.querySelector("#hSair").onclick = () => {
    sessionStorage.removeItem("sn_role"); S.role = null; go("gate");
  };
  return h;
}

// ════════════════════════════════════════════════════
// GATE
// ════════════════════════════════════════════════════
function gate() {
  ROOT.innerHTML = `
  <div class="gate-pg">
    <div class="gate-card">
      <div class="gate-logo">📚</div>
      <h1 class="gate-title">StudyNet</h1>
      <p class="gate-sub">Repositório de materiais de estudo</p>
      <button class="btn btn-p btn-fw" id="gStu" style="margin-top:6px">📖 Entrar como Aluno</button>
      <div class="dvd">acesso ADM</div>
      <div class="gate-row">
        <input class="inp" id="gPass" type="password" placeholder="Senha do ADM" style="flex:1"/>
        <button class="btn btn-p" id="gAdm">→</button>
      </div>
      <p id="gErr" class="gate-err" style="display:none">❌ Senha incorreta</p>
    </div>
  </div>`;

  document.getElementById("gStu").onclick = () => {
    sessionStorage.setItem("sn_role","student"); S.role="student"; go("home");
  };

  const tryAdm = async () => {
    const btn = document.getElementById("gAdm");
    const p   = document.getElementById("gPass").value;
    if (!p) return;
    btn.disabled = true; btn.textContent = "…";

    try {
      const h = await sha256(p);
      let stored = await sbGetConfig("adm_hash");
      if (!stored) {
        // primeira vez: cria hash padrão
        stored = await sha256("adm2024");
        await sbSetConfig("adm_hash", stored);
      }
      if (h === stored) {
        sessionStorage.setItem("sn_role","adm"); S.role="adm"; go("home");
      } else {
        const e = document.getElementById("gErr");
        if (e) { e.style.display = "block"; setTimeout(() => { if(e) e.style.display="none"; }, 2500); }
        btn.disabled = false; btn.textContent = "→";
      }
    } catch(err) {
      alert("Erro ao verificar senha: " + err.message);
      btn.disabled = false; btn.textContent = "→";
    }
  };

  document.getElementById("gAdm").onclick = tryAdm;
  document.getElementById("gPass").onkeydown = e => { if(e.key==="Enter") tryAdm(); };
}

// ════════════════════════════════════════════════════
// HOME
// ════════════════════════════════════════════════════
const EMOJIS = ["🧠","📊","📈","📉","🗂","🏛","🔬","🔗","📚","📐","🎯","💡","🧮","🌍","⚗️","🏗","📝","🎓","🔭","💰","📜","🧬","📡","🎲","🖊","🖥","📱","🏆"];
const COLORS  = ["#a78bfa","#34d399","#60a5fa","#f472b6","#fb923c","#facc15","#2dd4bf","#f87171","#818cf8","#4ade80","#38bdf8","#e879f9","#f97316","#a3e635","#fb7185","#fcd34d"];

async function home() {
  const page = document.createElement("div"); page.className = "page";
  page.appendChild(mkHdr());
  const wrap = document.createElement("main"); wrap.className = "wrap";

  // Loading state
  wrap.innerHTML = `<div class="ctr" style="min-height:60vh"><div class="spin"></div><p style="color:var(--mu);font-size:13px;margin-top:8px">Carregando matérias…</p></div>`;
  page.appendChild(wrap); ROOT.appendChild(page);

  let subjs = [];
  try {
    subjs = await sbGetSubjects();
  } catch(e) {
    wrap.innerHTML = `<div class="empty"><div style="font-size:48px">⚠️</div><p class="empty-title">Erro ao carregar</p><p class="empty-sub">${esc(e.message)}</p></div>`;
    return;
  }

  wrap.innerHTML = `
    <div class="hero">
      <div>
        <h1 class="hero-title">Matérias</h1>
        <p class="hero-sub">${subjs.length} matéria(s) disponível(is)</p>
      </div>
      ${S.role==="adm" ? `<button class="btn btn-p" id="btnNew">+ Nova Matéria</button>` : ""}
    </div>
    <div class="subj-grid" id="grid"></div>
    ${subjs.length===0 ? `<div class="empty">
      <div style="font-size:52px">🎓</div>
      <p class="empty-title">Nenhuma matéria ainda</p>
      <p class="empty-sub">${S.role==="adm" ? "Clique em + Nova Matéria para começar!" : "O ADM ainda não criou nenhuma matéria."}</p>
    </div>` : ""}`;

  document.getElementById("btnNew")?.addEventListener("click", () => openSubjModal());

  const grid = document.getElementById("grid");
  subjs.forEach((s, i) => {
    const card = document.createElement("div");
    card.className = "subj-card";
    card.style.animationDelay = `${i*40}ms`;
    card.innerHTML = `
      <div class="subj-top" style="background:${s.color}"></div>
      <div class="subj-body">
        <div class="subj-ico" style="background:${s.color}22;color:${s.color}">${s.emoji}</div>
        <div class="subj-name">${esc(s.name)}</div>
        <div class="subj-sub">${esc(s.sub||"")}</div>
        <div class="subj-ft">
          <span class="subj-chip" style="background:${s.color}22;color:${s.color}" data-go="${s.id}">
            Ver arquivos →
          </span>
          ${S.role==="adm" ? `<div class="subj-adm">
            <button class="btn btn-g btn-sm" data-edit="${s.id}">✏️</button>
            <button class="btn btn-d btn-sm" data-del="${s.id}">🗑</button>
          </div>` : ""}
        </div>
      </div>`;
    grid.appendChild(card);
  });

  document.querySelectorAll("[data-go]").forEach(el =>
    el.onclick = () => go("subjectView", { subjId: el.dataset.go })
  );
  document.querySelectorAll("[data-edit]").forEach(el =>
    el.onclick = e => {
      e.stopPropagation();
      const s = subjs.find(x => x.id === el.dataset.edit);
      openSubjModal(s);
    }
  );
  document.querySelectorAll("[data-del]").forEach(el =>
    el.onclick = async e => {
      e.stopPropagation();
      const s = subjs.find(x => x.id === el.dataset.del);
      if (!confirm(`Excluir a matéria "${s?.name}"?`)) return;
      try {
        await sbDelSubject(el.dataset.del);
        go("home");
      } catch(err) { alert("Erro ao excluir: " + err.message); }
    }
  );
}

function openSubjModal(existing = null) {
  const isEdit = !!existing;
  let selEmoji = existing?.emoji || "📚";
  let selColor = existing?.color || "#a78bfa";

  openModal(`
    <p class="modal-title">${isEdit ? "Editar Matéria" : "Nova Matéria"}</p>
    <div>
      <span class="lbl">Ícone</span>
      <div class="emoji-grid">${EMOJIS.map(e=>`<button class="emj${e===selEmoji?" emj-on":""}" data-e="${e}">${e}</button>`).join("")}</div>
    </div>
    <div>
      <span class="lbl">Cor</span>
      <div class="clr-grid">${COLORS.map(c=>`<div class="clr${c===selColor?" clr-on":""}" data-c="${c}" style="background:${c}"></div>`).join("")}</div>
    </div>
    <div><label class="lbl">Nome *</label><input class="inp" id="mName" placeholder="ex: Cálculo I" value="${esc(existing?.name||"")}"/></div>
    <div><label class="lbl">Subtítulo (opcional)</label><input class="inp" id="mSub" placeholder="ex: Derivadas e Integrais" value="${esc(existing?.sub||"")}"/></div>
    <div class="modal-row">
      <button class="btn btn-g" id="mCan">Cancelar</button>
      <button class="btn btn-p" id="mOk">${isEdit ? "Salvar" : "Criar"}</button>
    </div>`,
  m => {
    m.querySelectorAll(".emj").forEach(b => {
      b.onclick = () => { selEmoji=b.dataset.e; m.querySelectorAll(".emj").forEach(x=>x.className="emj"+(x.dataset.e===selEmoji?" emj-on":"")); };
    });
    m.querySelectorAll(".clr").forEach(b => {
      b.onclick = () => { selColor=b.dataset.c; m.querySelectorAll(".clr").forEach(x=>x.className="clr"+(x.dataset.c===selColor?" clr-on":"")); };
    });
    m.querySelector("#mCan").onclick = closeModal;
    m.querySelector("#mOk").onclick = async () => {
      const name = m.querySelector("#mName").value.trim();
      if (!name) { m.querySelector("#mName").focus(); return; }
      const sub = m.querySelector("#mSub").value.trim();
      const okBtn = m.querySelector("#mOk");
      okBtn.disabled = true; okBtn.textContent = "Salvando…";
      try {
        if (isEdit) {
          await sbEditSubject(existing.id, { name, sub, emoji: selEmoji, color: selColor });
        } else {
          await sbAddSubject({ id: gid(), name, sub, emoji: selEmoji, color: selColor });
        }
        closeModal(); go("home");
      } catch(err) {
        alert("Erro ao salvar: " + err.message);
        okBtn.disabled = false; okBtn.textContent = isEdit ? "Salvar" : "Criar";
      }
    };
  });
}

// ════════════════════════════════════════════════════
// SUBJECT VIEW
// ════════════════════════════════════════════════════
async function subjectView() {
  const page = document.createElement("div"); page.className = "page";
  page.appendChild(mkHdr());
  const wrap = document.createElement("main"); wrap.className = "wrap";

  wrap.innerHTML = `<div class="ctr" style="min-height:60vh"><div class="spin"></div><p style="color:var(--mu);font-size:13px;margin-top:8px">Carregando…</p></div>`;
  page.appendChild(wrap); ROOT.appendChild(page);

  let subj, fs;
  try {
    const subjs = await sbGetSubjects();
    subj = subjs.find(s => s.id === S.subjId);
    if (!subj) { go("home"); return; }
    fs = await sbGetFiles(S.subjId);
  } catch(e) {
    wrap.innerHTML = `<div class="empty"><p class="empty-title">Erro ao carregar</p><p class="empty-sub">${esc(e.message)}</p></div>`;
    return;
  }

  wrap.innerHTML = `
    <div class="subj-hdr">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        <button class="btn btn-g btn-sm" id="sBack">← Voltar</button>
        ${S.role==="adm" ? `<button class="btn btn-p btn-sm" id="sUp">⬆ Upload</button>` : ""}
      </div>
      <div class="subj-title">
        <span style="color:${subj.color}">${subj.emoji}</span> ${esc(subj.name)}
        ${subj.sub ? `<span style="color:var(--mu);font-size:16px;font-weight:400"> — ${esc(subj.sub)}</span>` : ""}
      </div>
      <div class="subj-meta">${fs.length} arquivo(s) disponível(is)</div>
    </div>
    <div class="file-list" id="fileList"></div>
    ${fs.length===0 ? `<div class="empty">
      <div style="font-size:48px">📂</div>
      <p class="empty-title">Nenhum arquivo ainda</p>
      <p class="empty-sub">${S.role==="adm" ? "Clique em ⬆ Upload para adicionar arquivos." : "O ADM ainda não publicou arquivos nesta matéria."}</p>
    </div>` : ""}`;

  document.getElementById("sBack").onclick = () => go("home");
  document.getElementById("sUp")?.addEventListener("click", () => go("uploadView"));

  const list = document.getElementById("fileList");
  fs.forEach((f, i) => {
    const card = document.createElement("div");
    card.className = "file-card";
    card.style.animationDelay = `${i*35}ms`;
    card.innerHTML = `
      <div class="file-card-hdr">
        <div class="file-info">
          <div class="file-ico">${fileIcon(f.name)}</div>
          <div style="min-width:0">
            <div class="file-name" title="${esc(f.name)}">${esc(f.name)}</div>
            <div class="file-date">${fmtDate(f.uploaded_at)}${f.size?" · "+fmtSize(f.size):""}</div>
          </div>
        </div>
        <div class="file-acts">
          <a href="${esc(f.url)}" target="_blank" rel="noopener" class="btn btn-gr btn-sm">⬇ Baixar</a>
          ${S.role==="adm" ? `<button class="btn btn-d btn-sm" data-del="${f.id}">🗑</button>` : ""}
        </div>
      </div>
      <div class="link-zone">
        <div class="link-lbl">🔗 Link do Resumo</div>
        <div id="lz_${f.id}"></div>
      </div>`;
    list.appendChild(card);

    renderLinkZone(f);

    card.querySelector(`[data-del="${f.id}"]`)?.addEventListener("click", async () => {
      if (!confirm(`Excluir "${f.name}"?`)) return;
      try {
        await sbDelFile(f.id);
        go("subjectView");
      } catch(err) { alert("Erro ao excluir: " + err.message); }
    });
  });
}

function renderLinkZone(f) {
  const lz = document.getElementById(`lz_${f.id}`);
  if (!lz) return;
  if (f.resume_link) {
    lz.innerHTML = `<div class="link-box">
      <a href="${esc(f.resume_link)}" target="_blank" rel="noopener">📄 Abrir resumo</a>
      ${S.role==="adm" ? `<button class="btn btn-g btn-sm" id="le_${f.id}">✏️</button>` : ""}
    </div>`;
    document.getElementById(`le_${f.id}`)?.addEventListener("click", () => editLinkZone(f));
  } else {
    lz.innerHTML = S.role==="adm"
      ? `<button class="btn btn-g btn-sm" id="la_${f.id}">+ Adicionar link do resumo</button>`
      : `<span class="link-empty">Nenhum resumo disponível ainda.</span>`;
    document.getElementById(`la_${f.id}`)?.addEventListener("click", () => editLinkZone(f));
  }
}

function editLinkZone(f) {
  const lz = document.getElementById(`lz_${f.id}`);
  if (!lz) return;
  lz.innerHTML = `<div class="link-edit-row">
    <input class="inp" id="li_${f.id}" placeholder="Cole o link do resumo aqui…" value="${esc(f.resume_link||"")}"/>
    <button class="btn btn-p btn-sm" id="ls_${f.id}">Salvar</button>
    <button class="btn btn-g btn-sm" id="lc_${f.id}">✕</button>
  </div>`;
  document.getElementById(`ls_${f.id}`).onclick = async () => {
    const v = document.getElementById(`li_${f.id}`).value.trim();
    try {
      await sbEditFile(f.id, { resume_link: v });
      f.resume_link = v;
      renderLinkZone(f);
    } catch(err) { alert("Erro ao salvar link: " + err.message); }
  };
  document.getElementById(`lc_${f.id}`).onclick = () => renderLinkZone(f);
}

// ════════════════════════════════════════════════════
// UPLOAD VIEW
// ════════════════════════════════════════════════════
async function uploadView() {
  if (S.role !== "adm") { go("home"); return; }

  const page = document.createElement("div"); page.className = "page";
  page.appendChild(mkHdr());
  const wrap = document.createElement("main"); wrap.className = "wrap wrap-sm";

  // busca dados do subject
  let subj = null;
  try {
    const subjs = await sbGetSubjects();
    subj = subjs.find(s => s.id === S.subjId);
  } catch(e) {}

  wrap.innerHTML = `
    <div style="margin-bottom:24px">
      <button class="btn btn-g btn-sm" id="uBack" style="margin-bottom:14px">← Voltar</button>
      <h1 style="font-family:var(--fh);font-weight:900;font-size:26px;letter-spacing:-.5px">⬆ Upload de Arquivo</h1>
      <p style="font-size:13px;margin-top:8px">
        <span style="color:${subj?.color};font-weight:600">${subj?.emoji} ${esc(subj?.name)}</span>
        ${subj?.sub ? `<span style="color:var(--mu)"> — ${esc(subj?.sub)}</span>` : ""}
      </p>
    </div>

    <div class="drop" id="dz">
      <input type="file" id="fi" accept=".pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx,.zip,.rar,.txt" style="display:none"/>
      <div class="drop-ico" id="dIco">☁️</div>
      <p class="drop-lbl" id="dLbl">Toque aqui para escolher o arquivo</p>
      <p class="drop-hint">PDF, Word, PowerPoint, Excel, ZIP… (máx. 50MB)</p>
    </div>

    <div id="progArea" style="display:none;margin-bottom:16px">
      <div class="prog-wrap"><div class="prog-bar" id="progBar" style="width:0%"></div></div>
      <p class="prog-msg" id="progMsg">Aguardando…</p>
    </div>

    <button class="btn btn-p btn-fw" id="btnUp" disabled>🚀 Enviar arquivo</button>
    <p id="upErr" style="color:#ff4d6d;font-size:13px;margin-top:10px;text-align:center;display:none"></p>`;

  page.appendChild(wrap); ROOT.appendChild(page);

  document.getElementById("uBack").onclick = () => go("subjectView");

  let selectedFile = null;
  const dz  = document.getElementById("dz");
  const fi  = document.getElementById("fi");
  const btn = document.getElementById("btnUp");
  const errEl = document.getElementById("upErr");

  function pick(file) {
    if (!file) return;
    selectedFile = file;
    document.getElementById("dIco").textContent = fileIcon(file.name);
    document.getElementById("dLbl").textContent = file.name + " (" + fmtSize(file.size) + ")";
    btn.disabled = false;
    errEl.style.display = "none";
    dz.classList.remove("drop-on");
  }

  dz.onclick = () => fi.click();
  fi.onchange = e => pick(e.target.files[0]);
  dz.ondragover  = e => { e.preventDefault(); dz.classList.add("drop-on"); };
  dz.ondragleave = () => dz.classList.remove("drop-on");
  dz.ondrop = e => { e.preventDefault(); pick(e.dataTransfer.files[0]); };

  btn.onclick = async () => {
    if (!selectedFile) return;
    btn.disabled = true;
    errEl.style.display = "none";

    const progArea = document.getElementById("progArea");
    const progBar  = document.getElementById("progBar");
    const progMsg  = document.getElementById("progMsg");

    progArea.style.display = "block";
    progBar.style.width = "2%";
    progMsg.textContent = "Conectando ao Cloudinary…";

    try {
      const result = await uploadToCloudinary(selectedFile, pct => {
        progBar.style.width = pct + "%";
        progMsg.textContent = `Enviando… ${pct}%`;
      });

      progBar.style.width = "90%";
      progMsg.textContent = "Salvando no banco de dados…";

      await sbAddFile({
        id:          gid(),
        subject_id:  S.subjId,
        name:        selectedFile.name,
        url:         result.url,
        public_id:   result.publicId,
        size:        result.bytes || selectedFile.size,
        resume_link: "",
      });

      progBar.style.width = "100%";
      progMsg.textContent = "✅ Enviado com sucesso!";

      setTimeout(() => go("subjectView"), 800);

    } catch(e) {
      progArea.style.display = "none";
      progBar.style.width = "0%";
      btn.disabled = false;
      errEl.textContent = "❌ " + e.message;
      errEl.style.display = "block";
    }
  };
}

// ════════════════════════════════════════════════════
// SETTINGS
// ════════════════════════════════════════════════════
function settingsView() {
  const page = document.createElement("div"); page.className = "page";
  page.appendChild(mkHdr());
  const wrap = document.createElement("main"); wrap.className = "wrap wrap-sm";
  wrap.innerHTML = `
    <div style="margin-bottom:26px">
      <button class="btn btn-g btn-sm" id="stBack" style="margin-bottom:14px">← Voltar</button>
      <h1 style="font-family:var(--fh);font-weight:900;font-size:26px;letter-spacing:-.5px">⚙️ Configurações</h1>
    </div>
    <div class="set-card">
      <h3>Alterar senha do ADM</h3>
      <p>Senha padrão: <strong>adm2024</strong></p>
      <input class="inp" id="nPass" type="password" placeholder="Nova senha (mín. 4 caracteres)"/>
      <button class="btn btn-p" id="sSave">Salvar nova senha</button>
      <p id="sOk" class="ok-msg" style="display:none">✅ Senha atualizada!</p>
      <p id="sErr" style="color:#ff4d6d;font-size:13px;display:none"></p>
    </div>`;
  page.appendChild(wrap); ROOT.appendChild(page);

  document.getElementById("stBack").onclick = () => go("home");
  document.getElementById("sSave").onclick = async () => {
    const p = document.getElementById("nPass").value.trim();
    if (p.length < 4) { alert("Senha muito curta (mín. 4 caracteres)."); return; }
    const saveBtn = document.getElementById("sSave");
    saveBtn.disabled = true; saveBtn.textContent = "Salvando…";
    try {
      const h = await sha256(p);
      await sbSetConfig("adm_hash", h);
      document.getElementById("nPass").value = "";
      const ok = document.getElementById("sOk");
      ok.style.display = "block";
      setTimeout(() => { if(ok) ok.style.display="none"; }, 3500);
    } catch(err) {
      const eEl = document.getElementById("sErr");
      eEl.textContent = "Erro: " + err.message;
      eEl.style.display = "block";
    }
    saveBtn.disabled = false; saveBtn.textContent = "Salvar nova senha";
  };
}

function boot() {
  if (!S.role) go("gate");
  else go("home");
}

boot();
