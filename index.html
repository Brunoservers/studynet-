<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#080812"/>
<title>StudyNet</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080812;--surface:#111122;--surface2:#161628;
  --border:#1c1c35;--border2:#252540;
  --text:#ededf5;--muted:#5a5a80;--muted2:#8888aa;
  --accent:#634cdc;--accent2:#38b69b;
  --fh:'Fraunces',serif;--fb:'DM Sans',sans-serif;
  --r:14px;--rlg:20px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-size:15px;line-height:1.65;min-height:100vh;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 10% 0%,rgba(99,76,220,.07),transparent),radial-gradient(ellipse 60% 50% at 90% 100%,rgba(56,182,155,.05),transparent);pointer-events:none;z-index:0}
#app{position:relative;z-index:1;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
/* Layout */
.page{min-height:100vh;display:flex;flex-direction:column}
.main{max-width:980px;margin:0 auto;padding:36px 20px;width:100%;flex:1}
.main-sm{max-width:600px}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;padding:24px;text-align:center}
/* Header */
.header{background:rgba(8,8,18,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 20px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:10px;color:var(--text)}
.logo-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px}
.logo-text{font-family:var(--fh);font-weight:900;font-size:19px;letter-spacing:-.5px}
.header-right{display:flex;align-items:center;gap:8px}
.badge{background:rgba(99,76,220,.15);color:#a48fff;border:1px solid rgba(99,76,220,.35);border-radius:6px;padding:2px 9px;font-size:11px;font-weight:600;letter-spacing:.8px}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;border-radius:var(--r);font-family:var(--fb);font-weight:600;font-size:14px;cursor:pointer;transition:all .18s;white-space:nowrap;text-decoration:none;padding:11px 22px}
.btn:active{transform:scale(.97)}.btn:disabled{opacity:.38;cursor:not-allowed;transform:none}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 20px rgba(99,76,220,.28)}
.btn-ghost{background:var(--surface2);color:var(--muted2);border:1px solid var(--border2)}
.btn-ghost:hover{color:var(--text)}
.btn-danger{background:rgba(255,77,109,.1);color:#ff4d6d;border:1px solid rgba(255,77,109,.35)}
.btn-green{background:rgba(56,182,155,.1);color:var(--accent2);border:1.5px solid var(--accent2)}
.btn-yellow{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.4)}
.btn-sm{padding:7px 14px;font-size:13px}.btn-full{width:100%}
/* Inputs */
.inp,.sel{width:100%;background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--r);padding:12px 15px;color:var(--text);font-family:var(--fb);font-size:14px;outline:none;transition:border-color .2s;appearance:none}
.inp:focus,.sel:focus{border-color:var(--accent)}.inp::placeholder{color:var(--muted)}
/* Gate */
.gate-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);background-image:radial-gradient(ellipse at 20% 40%,rgba(99,76,220,.09),transparent 60%),radial-gradient(ellipse at 80% 70%,rgba(56,182,155,.06),transparent 50%)}
.gate-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:44px 36px;width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;gap:16px;animation:up .4s ease;box-shadow:0 12px 60px rgba(0,0,0,.5)}
.gate-logo{width:64px;height:64px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px}
.gate-title{font-family:var(--fh);font-weight:900;font-size:32px;letter-spacing:-1px}
.gate-sub{color:var(--muted);font-size:14px}
.divider{width:100%;display:flex;align-items:center;gap:12px;color:var(--muted);font-size:12px}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border)}
.gate-row{display:flex;gap:8px;width:100%}
.gate-err{color:#ff4d6d;font-size:13px;text-align:center;animation:up .2s ease}
/* Hero */
.hero{margin-bottom:32px}
.hero-title{font-family:var(--fh);font-weight:900;font-size:32px;letter-spacing:-.8px;line-height:1.15}
.hero-sub{color:var(--muted2);font-size:14px;margin-top:6px}
/* Subject grid */
.subj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
.subj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:0;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;animation:up .35s ease both}
.subj-card:hover{transform:translateY(-3px);box-shadow:0 10px 36px rgba(0,0,0,.38)}
.subj-bar{height:3px;border-radius:20px 20px 0 0}
.subj-body{padding:22px}
.subj-icon{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px;margin-bottom:12px}
.subj-name{font-family:var(--fh);font-weight:700;font-size:16px;line-height:1.3;margin-bottom:3px}
.subj-sub{font-size:12px;color:var(--muted);margin-bottom:14px;min-height:16px}
.subj-footer{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.subj-chip{display:inline-block;font-size:12px;font-weight:600;padding:4px 13px;border-radius:99px;cursor:pointer}
.subj-adm-btns{display:flex;gap:6px}
/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:28px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;padding:11px 16px;font-family:var(--fb);font-size:13px;font-weight:600;color:var(--muted);white-space:nowrap;transition:color .15s}
.tab:hover{color:var(--text)}.tab-active{color:#a48fff;border-bottom-color:var(--accent)}
/* Drop zone */
.drop{border:2px dashed var(--border2);border-radius:var(--rlg);padding:40px 20px;text-align:center;cursor:pointer;transition:all .22s;margin-bottom:20px}
.drop:hover,.drop-on{border-color:var(--accent);background:rgba(99,76,220,.05)}
.drop-icon{font-size:42px;margin-bottom:10px}
.drop-label{font-family:var(--fh);font-weight:700;font-size:16px;margin-bottom:4px}
.drop-hint{font-size:13px;color:var(--muted)}
/* Progress bars */
.prog-wrap{height:5px;background:var(--border);border-radius:99px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .3s}
/* File card */
.file-card{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--rlg);margin-bottom:20px;overflow:hidden}
.file-card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;gap:12px;flex-wrap:wrap}
.file-info{display:flex;align-items:center;gap:12px}
.file-name{font-weight:600;font-size:14px}
.file-meta{font-size:12px;color:var(--muted);margin-top:2px}
.file-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.link-section{padding:0 18px 16px}
.link-label{font-size:12px;color:var(--muted2);font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.link-display{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px}
.link-display a{color:#a48fff;font-size:13px;text-decoration:none;flex:1;word-break:break-all}
.link-display a:hover{text-decoration:underline}
.link-edit-row{display:flex;gap:8px}
.link-edit-row .inp{font-size:13px;padding:9px 12px}
/* Markdown */
.md-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:28px;line-height:1.85;margin-top:4px}
.md-box h2{font-family:var(--fh);font-size:18px;font-weight:700;color:#a48fff;border-bottom:1px solid var(--border);padding-bottom:7px;margin:26px 0 11px}
.md-box h2:first-child{margin-top:0}
.md-box h3{font-family:var(--fh);font-size:14px;font-weight:700;color:#5fd4bb;margin:16px 0 6px}
.md-box p{color:#9898bb;font-size:14px;margin:4px 0}
.md-box li{color:#9898bb;font-size:14px;margin:3px 0 3px 20px;list-style:disc}
.md-box strong{color:var(--text)}
/* Flashcard */
.fc-wrap{display:flex;flex-direction:column;align-items:center;width:100%}
.fc-meta{display:flex;align-items:center;gap:12px;width:100%;margin-bottom:20px}
.fc-count{font-size:12px;color:var(--muted);white-space:nowrap}
.fc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:46px 26px;text-align:center;cursor:pointer;min-height:200px;width:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;box-shadow:0 8px 36px rgba(0,0,0,.28);user-select:none;transition:transform .18s;animation:up .22s ease}
.fc-card:hover{transform:translateY(-2px)}
.fc-side{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:18px}
.fc-text{font-family:var(--fh);font-size:20px;font-weight:700;line-height:1.45}
.fc-hint{font-size:12px;color:var(--border2);margin-top:16px}
.fc-btns{display:flex;gap:12px;margin-top:20px;width:100%}
.fc-btns .btn{flex:1}
/* Quiz */
.quiz-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:24px}
.quiz-q{font-family:var(--fh);font-size:17px;font-weight:700;line-height:1.45;margin-bottom:20px}
.opt{display:flex;align-items:center;gap:12px;width:100%;padding:12px 15px;margin-bottom:9px;border:1.5px solid var(--border2);border-radius:var(--r);cursor:pointer;background:var(--surface2);color:var(--muted2);font-size:14px;text-align:left;transition:all .15s;font-family:var(--fb)}
.opt:hover:not(:disabled){border-color:var(--accent);color:var(--text)}
.opt-correct{background:rgba(56,182,155,.1)!important;border-color:var(--accent2)!important;color:var(--accent2)!important}
.opt-wrong{background:rgba(255,77,109,.1)!important;border-color:#ff4d6d!important;color:#ff4d6d!important}
.opt-faded{opacity:.3}
.opt-letter{background:var(--border);border-radius:7px;width:27px;height:27px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.quiz-fb{border-radius:var(--r);padding:12px 14px;margin-top:14px;font-size:13px;font-weight:600}
.quiz-fb-ok{background:rgba(56,182,155,.1);color:var(--accent2);border:1px solid var(--accent2)}
.quiz-fb-err{background:rgba(255,77,109,.1);color:#ff4d6d;border-color:#ff4d6d}
/* Result */
.result{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:46px 26px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:13px;max-width:420px;margin:28px auto;animation:up .3s ease}
.result-title{font-family:var(--fh);font-weight:900;font-size:26px;letter-spacing:-.5px}
.result-sub{color:var(--muted);font-size:15px}
.result-score{font-family:var(--fh);font-weight:900;font-size:52px;background:linear-gradient(135deg,#a48fff,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.result-acts{display:flex;flex-direction:column;gap:9px;width:100%;margin-top:6px}
/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:14px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-top:3px solid;border-radius:var(--rlg);padding:18px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:5px}
.stat-val{font-family:var(--fh);font-weight:900;font-size:27px}
.stat-label{font-size:12px;color:var(--muted)}
.hist-row{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:8px}
/* Empty & Spinner */
.empty{text-align:center;padding:56px 20px;display:flex;flex-direction:column;align-items:center;gap:13px}
.empty-title{font-family:var(--fh);font-weight:700;font-size:20px;color:var(--muted2)}
.empty-sub{color:var(--muted);max-width:320px;font-size:14px}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:48px 0}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:up .2s ease}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rlg);padding:32px 28px;width:100%;max-width:440px;display:flex;flex-direction:column;gap:14px;box-shadow:0 16px 60px rgba(0,0,0,.6)}
.modal-title{font-family:var(--fh);font-weight:900;font-size:22px;letter-spacing:-.5px}
.modal-sub{font-size:13px;color:var(--muted)}
.modal-actions{display:flex;gap:10px;margin-top:4px}
.modal-actions .btn{flex:1}
/* Emoji picker */
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-bottom:4px}
.emoji-btn{background:var(--surface2);border:2px solid transparent;border-radius:9px;padding:7px;font-size:20px;cursor:pointer;transition:all .15s;text-align:center}
.emoji-btn:hover,.emoji-btn-sel{border-color:var(--accent);background:rgba(99,76,220,.15)}
/* Color picker */
.color-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px}
.color-btn{width:32px;height:32px;border-radius:8px;border:3px solid transparent;cursor:pointer;transition:all .15s}
.color-btn-sel{border-color:white;transform:scale(1.1)}
/* Settings */
.settings-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:26px;display:flex;flex-direction:column;gap:12px}
.settings-card h3{font-family:var(--fh);font-weight:700;font-size:17px}
.settings-card p{color:var(--muted);font-size:13px}
.ok-msg{color:var(--accent2);font-size:14px;animation:up .2s ease}
.error-msg{color:#ff4d6d;font-size:13px;animation:up .2s ease;padding:12px;background:rgba(255,77,109,.1);border-radius:var(--r);margin-bottom:12px}
/* Responsive */
@media(max-width:640px){
  .main{padding:24px 14px}.header{padding:0 14px}
  .subj-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .fc-card{padding:34px 18px}.result{padding:36px 18px}
  .gate-card{padding:34px 20px}.hero-title{font-size:26px}
  .tab{padding:10px 11px;font-size:12px}
  .modal{padding:26px 20px}
}
</style>
</head>
<body>
<div id="app"><div class="center"><div class="spinner"></div></div></div>

<script>
// ═══════════════════════════════════════════════════════════════════
// ⚠️  COLE SUAS CREDENCIAIS AQUI
// ═══════════════════════════════════════════════════════════════════

// JSONBIN.IO → jsonbin.io → cadastre-se → Bins → Create Bin (crie com {})
// Copie o Bin ID e a Access Key (Master Key ou Access Key)
const JSONBIN = {
  binId:     "69b1e91cc3097a1dd5190795",
  accessKey: "$2a$10$U0z9wAWSoLXYzldl4grbY.1yrURXzy/OqIR2ST4jCLcXFXutGjzi2",
};

// CLOUDINARY → cloudinary.com → Dashboard
// Settings → Upload → Add upload preset → marcar "Unsigned" → salvar
const CLOUDINARY = {
  cloudName:    "dzaogzywr",
  uploadPreset: "studynet",
};

// Senha inicial do ADM (pode trocar em ⚙️ Configurações depois)
const ADM_SENHA_INICIAL = "adm2024";

// ═══════════════════════════════════════════════════════════════════

// ── JSONBin helpers ───────────────────────────────────────────────
const BIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN.binId}`;
const BIN_HDR = {"Content-Type":"application/json","X-Access-Key":JSONBIN.accessKey,"X-Bin-Versioning":"false"};

async function dbRead() {
  const r = await fetch(BIN_URL, {headers:BIN_HDR});
  if(!r.ok) throw new Error(`Erro ao ler banco de dados: ${r.status}`);
  const d = await r.json();
  return d.record || {};
}
async function dbWrite(data) {
  const r = await fetch(BIN_URL, {method:"PUT", headers:BIN_HDR, body:JSON.stringify(data)});
  if(!r.ok) throw new Error(`Erro ao salvar banco de dados: ${r.status}`);
}
async function dbUpdate(patch) {
  const cur = await dbRead();
  await dbWrite({...cur, ...patch});
}

// ── Cloudinary upload ─────────────────────────────────────────────
async function uploadCloud(file, onPct) {
  const fd = new FormData();
  fd.append("file", file);
  fd.append("upload_preset", CLOUDINARY.uploadPreset);
  fd.append("folder", "studynet");
  return new Promise((res,rej)=>{
    const xhr = new XMLHttpRequest();
    xhr.open("POST",`https://api.cloudinary.com/v1_1/${CLOUDINARY.cloudName}/auto/upload`);
    xhr.upload.onprogress = e=>{if(e.lengthComputable)onPct(Math.round(e.loaded/e.total*100))};
    xhr.onload=()=>{
      try{
        const d=JSON.parse(xhr.responseText);
        if(xhr.status===200)res({url:d.secure_url,publicId:d.public_id});
        else rej(new Error(d.error?.message||`Erro Cloudinary: ${xhr.status}`));
      }catch(e){rej(new Error("Resposta inválida do Cloudinary"))}
    };
    xhr.onerror=()=>rej(new Error("Falha de rede ao enviar arquivo"));
    xhr.send(fd);
  });
}

// ── Text extraction ───────────────────────────────────────────────
async function extractText(file){
  if(file.name.toLowerCase().endsWith(".pdf")){
    const ab=await file.arrayBuffer();
    const raw=new TextDecoder("latin1").decode(new Uint8Array(ab));
    const m=raw.match(/\(([^)]{2,})\)/g)||[];
    let t=m.map(x=>x.slice(1,-1)).join(" ").replace(/\\n/g,"\n");
    if(t.length<120)t=raw.replace(/[^\x20-\x7E\n]/g," ").slice(0,8000);
    return t;
  }
  return new Promise((res,rej)=>{
    const script=document.createElement("script");
    script.src="https://cdn.jsdelivr.net/npm/mammoth@1.7.0/mammoth.browser.min.js";
    script.onload=async()=>{
      try{
        const ab=await file.arrayBuffer();
        const r=await mammoth.extractRawText({arrayBuffer:ab});
        res(r.value);
      }catch(e){rej(new Error("Erro ao extrair texto do Word"))}
    };
    script.onerror=()=>rej(new Error("Falha ao carregar biblioteca de leitura de Word"));
    document.head.appendChild(script);
  });
}

// ── Helpers ───────────────────────────────────────────────────────
function uid(){let id=localStorage.getItem("sn_uid");if(!id){id=Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem("sn_uid",id);}return id;}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function md2html(md){
  return String(md||"").split("\n").map(l=>{
    if(l.startsWith("## ")) return`<h2>${esc(l.slice(3))}</h2>`;
    if(l.startsWith("### "))return`<h3>${esc(l.slice(4))}</h3>`;
    if(l.startsWith("- ")) return`<li>${esc(l.slice(2))}</li>`;
    if(/^\*\*(.+)\*\*$/.test(l))return`<strong>${esc(l.slice(2,-2))}</strong>`;
    if(l.trim()==="")return"<br/>";
    return`<p>${esc(l)}</p>`;
  }).join("");
}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function pj(raw){try{return JSON.parse(raw.replace(/```json|```/g,"").trim())}catch{return null}}

// ── State ─────────────────────────────────────────────────────────
const S = {
  role: sessionStorage.getItem("sn_role"),
  admHash: null,

// ── Render engine ─────────────────────────────────────────────────
const ROOT = document.getElementById("app");
function go(view, patch={}) {
  S.unsubs.forEach(u=>{try{u()}catch{}});
  S.unsubs=[];
  Object.assign(S, patch);
  ROOT.innerHTML="";
  window.scrollTo(0,0);
  ({gate,home,upload,subject,settings})[view]?.();
}

// ── DB accessors ──────────────────────────────────────────────────
function getSubjects(){ return S.db.subjects || []; }
function getSubject(id){ return getSubjects().find(s=>s.id===id); }
function getSessions(subjId){ return (S.db.sessions||{})[subjId] || []; }
function getProgress(userId, subjId){ return ((S.db.progress||{})[`${userId}_${subjId}`]) || {}; }

async function persistDB(){ await dbWrite(S.db); }
async function addSubject(subj){
  S.db.subjects = [...(S.db.subjects||[]), subj];
  await persistDB();
}
async function updateSubject(id, patch){
  S.db.subjects = (S.db.subjects||[]).map(s=>s.id===id?{...s,...patch}:s);
  await persistDB();
}
async function deleteSubject(id){
  S.db.subjects = (S.db.subjects||[]).filter(s=>s.id!==id);
  if(S.db.sessions) delete S.db.sessions[id];
  await persistDB();
}
async function addSession(subjId, sess){
  if(!S.db.sessions) S.db.sessions={};
  S.db.sessions[subjId] = [...(S.db.sessions[subjId]||[]), sess];
  await persistDB();
}
async function updateSession(subjId, sessId, patch){
  S.db.sessions[subjId] = (S.db.sessions[subjId]||[]).map(s=>s.id===sessId?{...s,...patch}:s);
  await persistDB();
}
async function deleteSessionDB(subjId, sessId){
  S.db.sessions[subjId] = (S.db.sessions[subjId]||[]).filter(s=>s.id!==sessId);
  await persistDB();
}
async function saveProgressDB(userId, subjId, data){
  if(!S.db.progress) S.db.progress={};
  S.db.progress[`${userId}_${subjId}`] = data;
  await persistDB();
}

let selEmoji="📚",selColor="#634cdc";
function editSubject(existing=null){
  if(existing){selEmoji=existing.emoji;selColor=existing.color}
  const isEdit=!!existing;
  function closeModal(){ROOT.querySelector(".modal-overlay")?.remove()}
  const overlay=document.createElement("div"); overlay.className="modal-overlay";
  overlay.innerHTML=`
    <div class="modal">
      <h2 class="modal-title">${isEdit?"Editar":"Criar"} matéria</h2>
      <div>
        <label class="lbl" style="font-size:13px;color:var(--muted2);font-weight:600;display:block;margin-bottom:6px">Emoji</label>
        <div class="emoji-grid">${EMOJIS.map(e=>`<button class="emoji-btn${e===selEmoji?" emoji-btn-sel":""}" data-e="${e}" type="button">${e}</button>`).join("")}</div>
      </div>
      <div>
        <label class="lbl" style="font-size:13px;color:var(--muted2);font-weight:600;display:block;margin-bottom:6px">Cor</label>
        <div class="color-grid">${COLORS.map(c=>`<div class="color-btn${c===selColor?" color-btn-sel":""}" data-c="${c}" style="background:${c}"></div>`).join("")}</div>
      </div>
      <div><label class="lbl" style="font-size:13px;color:var(--muted2);font-weight:600;display:block;margin-bottom:6px">Nome da matéria</label>
        <input class="inp" id="mName" placeholder="ex: Cálculo I" value="${esc(existing?.name||"")}"/>
      </div>
      <div><label class="lbl" style="font-size:13px;color:var(--muted2);font-weight:600;display:block;margin-bottom:6px">Subtítulo (opcional)</label>
        <input class="inp" id="mSub" placeholder="ex: Derivadas e Integrais" value="${esc(existing?.sub||"")}"/>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="mCancel">Cancelar</button>
        <button class="btn btn-primary" id="mSave">${isEdit?"Salvar":"Criar"}</button>
      </div>`,
  (modal)=>{
    modal.querySelectorAll(".emoji-btn").forEach(b=>{
      b.onclick=()=>{selEmoji=b.dataset.e;modal.querySelectorAll(".emoji-btn").forEach(x=>x.className="emoji-btn"+(x.dataset.e===selEmoji?" emoji-btn-sel":""))};
    });
    modal.querySelectorAll(".color-btn").forEach(b=>{
      b.onclick=()=>{selColor=b.dataset.c;modal.querySelectorAll(".color-btn").forEach(x=>x.className="color-btn"+(x.dataset.c===selColor?" color-btn-sel":""))};
    });
    modal.querySelector("#mCancel").onclick=closeModal;
    modal.querySelector("#mSave").onclick=async()=>{
      const name=modal.querySelector("#mName").value.trim();
      if(!name){modal.querySelector("#mName").style.borderColor="#ff4d6d";return}
      const sub=modal.querySelector("#mSub").value.trim();
      if(isEdit){
        await updateSubject(existing.id,{name,sub,emoji:selEmoji,color:selColor});
      } else {
        await addSubject({id:genId(),name,sub,emoji:selEmoji,color:selColor,createdAt:new Date().toISOString()});
      }
      closeModal();
      go("home");
    };
  };
  ROOT.appendChild(overlay);
  overlay.onclick=e=>{if(e.target===overlay)closeModal()};
  const modal=overlay.querySelector(".modal");
  if(modal){
    const cb=modal.querySelector(".modal-actions");
    if(cb){
      const f=document.createDocumentFragment();
      const children=[...modal.children];
      children.forEach(c=>f.appendChild(c));
      modal.innerHTML="";
      modal.appendChild(f);
    }
  }
}

// ── UPLOAD (Simplified) ────────────────────────────────────────────
function upload(){
  const subj=getSubject(S.subjId);
  const page=document.createElement("div"); page.className="page";
  page.appendChild(mkHdr());
  const main=document.createElement("div"); main.className="main main-sm";
  main.innerHTML=`
    <div class="hero" style="margin-bottom:24px">
      <button class="btn btn-ghost btn-sm" id="uB" style="margin-bottom:16px">← Voltar</button>
      <h1 class="hero-title">Upload de Material</h1>
      <p style="margin-top:10px;font-size:14px">
        <span style="color:${subj?.color};font-weight:600">${subj?.emoji} ${esc(subj?.name)}</span>
        ${subj?.sub?`<span style="color:var(--muted)"> — ${esc(subj.sub)}</span>`:""}
      </p>
    </div>
    <div id="errMsg"></div>
    <div class="drop" id="dz">
      <input type="file" id="fi" accept=".pdf,.doc,.docx" style="display:none"/>
      <div class="drop-icon" id="dI">☁️</div>
      <p class="drop-label" id="dL">Toque para selecionar o arquivo</p>
      <p class="drop-hint">PDF ou Word (.docx)</p>
    </div>
    <button class="btn btn-primary btn-full" id="bP" disabled>🚀 Processar com IA</button>
    <div id="pS" style="display:none;margin-top:20px;text-align:center">
      <div class="prog-wrap" style="margin-bottom:10px"><div class="prog-bar" id="pB" style="width:5%"></div></div>
      <p style="font-size:13px;color:var(--muted);animation:pulse 1.5s ease infinite" id="pM">Iniciando…</p>
    </div>`;
  page.appendChild(main); ROOT.appendChild(page);
  document.getElementById("uB").onclick=()=>go("subject",{tab:"summary"});
  let sf=null;
  const dz=document.getElementById("dz"),fi=document.getElementById("fi");
  dz.onclick=()=>fi.click();
  dz.ondragover=e=>{e.preventDefault();dz.classList.add("drop-on")};
  dz.ondragleave=()=>dz.classList.remove("drop-on");
  dz.ondrop=e=>{e.preventDefault();dz.classList.remove("drop-on");pick(e.dataTransfer.files[0])};
  fi.onchange=e=>pick(e.target.files[0]);
  function pick(f){
    if(!f)return;
    if(!f.name.match(/\.(pdf|docx?|doc)$/i)){
      document.getElementById("errMsg").innerHTML=`<div class="error-msg">❌ Formato inválido! Use PDF ou DOCX</div>`;
      return;
    }
    sf=f;
    document.getElementById("errMsg").innerHTML="";
    document.getElementById("dI").textContent="📄";
    document.getElementById("dL").textContent=f.name;
    document.getElementById("bP").disabled=false;
  }
  document.getElementById("bP").onclick=async()=>{
    if(!sf)return;
    document.getElementById("bP").disabled=true;
    const ps=document.getElementById("pS"),pb=document.getElementById("pB"),pm=document.getElementById("pM"),em=document.getElementById("errMsg");
    ps.style.display="block";
    em.innerHTML="";
    try{
      pm.textContent="Enviando para o Cloudinary…";
      const{url}=await uploadCloud(sf,pct=>{pb.style.width=Math.max(5,Math.round(pct*.5))+"%"});
      pb.style.width="55%"; pm.textContent="Extraindo texto…";
      const text=await extractText(sf);
      pb.style.width="75%"; pm.textContent="Salvando…";
      await addSession(S.subjId,{id:genId(),fileName:sf.name,fileUrl:url,summary:"",flashcards:[],quiz:[],uploadedAt:new Date().toISOString(),resumeLink:""});
      pb.style.width="100%";
      setTimeout(()=>go("subject",{tab:"summary"}),500);
    }catch(err){
      em.innerHTML=`<div class="error-msg">❌ Erro: ${esc(err.message)}</div>`;
      document.getElementById("bP").disabled=false;
      ps.style.display="none";
    }
  };
}

    if(editing && S.role==="adm"){
      linkArea.innerHTML=`<div class="link-edit-row">
        <input class="inp" id="linkInp" placeholder="Cole o link do resumo aqui…" value="${esc(session.resumeLink||"")}"/>
        <button class="btn btn-primary btn-sm" id="linkSave">Salvar</button>
        <button class="btn btn-ghost btn-sm" id="linkCancel">✕</button>
      </div>`;
      document.getElementById("linkSave").onclick=async()=>{
        const v=document.getElementById("linkInp").value.trim();

// ── FLASHCARD TAB ─────────────────────────────────────────────────
function tabFlashcards(tc,session){
  const cards=session?.flashcards||[];
  if(!cards.length){tc.innerHTML=`<p style="color:var(--muted);margin-top:16px">Nenhum flashcard disponível. Faça upload de um arquivo primeiro.</p>`;return}
  let idx=0,flipped=false,knew=0;
  function draw(){
    const c=cards[idx];
    tc.innerHTML=`<div class="fc-wrap">
      <div class="fc-meta">
        <span class="fc-count">${idx+1}/${cards.length} · 💡 ${knew}</span>
        <div class="prog-wrap" style="flex:1"><div class="prog-bar" style="width:${(idx+1)/cards.length*100}%"></div></div>
      </div>
      <div class="fc-card" id="fcc">
        <div class="fc-side">${flipped?"Resposta":"Pergunta"}</div>
        <div class="fc-text">${esc(flipped?c.back:c.front)}</div>
        <div class="fc-hint">${flipped?"Clique para virar":"Clique para virar"}</div>
      </div>
      ${idx<cards.length-1||flipped?`<div class="fc-btns">
        <button class="btn btn-full" id="fcN" style="background:rgba(255,77,109,.12);color:#ff4d6d;border:1.5px solid #ff4d6d">✗ Não sabia</button>
        <button class="btn btn-full" id="fcY" style="background:rgba(56,182,155,.12);color:var(--accent2);border:1.5px solid var(--accent2)">✓ Sabia!</button>
      </div>`:""}
    </div>`;
    document.getElementById("fcc").onclick=()=>{flipped=!flipped;draw()};
    document.getElementById("fcN")?.addEventListener("click",()=>adv(false));
    document.getElementById("fcY")?.addEventListener("click",()=>adv(true));
  }
  async function adv(k){
    if(k)knew++;
    if(idx<cards.length-1){idx++;flipped=false;draw()}
    else{
      try{
        const p=getProgress(S.userId,S.subjId);
        await saveProgressDB(S.userId,S.subjId,{...p,flashDone:(p.flashDone||0)+cards.length,flashKnew:(p.flashKnew||0)+knew});
      }catch{}
      tc.innerHTML=`<div class="result"><div style="font-size:58px">🎉</div>
        <h2 class="result-title">Rodada concluída!</h2>
        <p class="result-sub">Você sabia ${knew} de ${cards.length} cards</p>
        <div class="result-acts">
          <button class="btn btn-primary btn-full" id="fR">Repetir</button>
          <button class="btn btn-ghost btn-full" id="fQ">Ir para o Quiz →</button>
        </div></div>`;
      document.getElementById("fR").onclick=()=>{idx=0;knew=0;flipped=false;draw()};
      document.getElementById("fQ").onclick=()=>{
        S.tab="quiz";
        document.querySelectorAll(".tab").forEach(b=>b.className="tab"+(b.dataset.k==="quiz"?" tab-active":""));
        tabQuiz(tc,session);
      };
    }
  }
  draw();
}

// ── QUIZ TAB ──────────────────────────────────────────────────────
function tabQuiz(tc,session){
  const qs=session?.quiz||[];
  if(!qs.length){tc.innerHTML=`<p style="color:var(--muted);margin-top:16px">Nenhum quiz disponível. Faça upload de um arquivo primeiro.</p>`;return}
  let idx=0,score=0,sel=null;
  function draw(){
    const q=qs[idx],ans=sel!==null;
    tc.innerHTML=`<div class="fc-meta"><span class="fc-count">Q${idx+1}/${qs.length} · ✓ ${score}</span>
      <div class="prog-wrap" style="flex:1"><div class="prog-bar" style="width:${idx/qs.length*100}%"></div></div></div>
      <div class="quiz-card"><p class="quiz-q">${esc(q.question)}</p>
        ${(q.options||[]).map((o,i)=>{
          let cls="opt";if(ans){if(i===q.answer)cls+=" opt-correct";else if(i===sel)cls+=" opt-wrong";else cls+=" opt-faded"}
          return`<button class="${cls}" data-i="${i}" ${ans?"disabled":""}><span class="opt-letter">${["A","B","C","D"][i]}</span>${esc(o)}</button>`
        }).join("")}
        ${ans?`<div class="quiz-fb ${sel===q.answer?"quiz-fb-ok":"quiz-fb-err"}">${sel===q.answer?"✓ Correto!":"✗ Incorreto — "+esc(q.options[q.answer])}</div>`:""}
      </div>
      ${ans?`<button class="btn btn-primary" style="margin-top:18px" id="qN">${idx<qs.length-1?"Próxima →":"Ver resultado"}</button>`:""}`;
    if(!ans)tc.querySelectorAll(".opt").forEach(b=>{b.onclick=()=>{sel=Number(b.dataset.i);if(sel===q.answer)score++;draw()}});
    document.getElementById("qN")?.addEventListener("click",async()=>{
      if(idx<qs.length-1){idx++;sel=null;draw()}
      else{
        try{
          const p=getProgress(S.userId,S.subjId);
          await saveProgressDB(S.userId,S.subjId,{...p,quizSessions:[...(p.quizSessions||[]),{date:new Date().toISOString(),score,total:qs.length}]});
        }catch{}
        const pct=Math.round(score/qs.length*100);
        tc.innerHTML=`<div class="result"><div style="font-size:58px">${pct>=70?"🏆":"📖"}</div>
          <h2 class="result-title">${score}/${qs.length} corretas</h2>
          <p class="result-sub">${pct>=70?"Ótimo resultado! 🔥":"Continue praticando!"}</p>
          <div class="result-score">${pct}%</div>
          <div class="result-acts">
            <button class="btn btn-primary btn-full" id="qR">Tentar novamente</button>
            <button class="btn btn-ghost btn-full" id="qP">Ver progresso →</button>
          </div></div>`;
        document.getElementById("qR").onclick=()=>{idx=0;score=0;sel=null;draw()};
        document.getElementById("qP").onclick=()=>{
          S.tab="progress";
          document.querySelectorAll(".tab").forEach(b=>b.className="tab"+(b.dataset.k==="progress"?" tab-active":""));
          tabProgress(tc);
        };
      }
    });
  }
  draw();
}

// ── PROGRESS TAB ──────────────────────────────────────────────────
function tabProgress(tc){
  const p=getProgress(S.userId,S.subjId);
  const qS=p.quizSessions||[],tQ=qS.reduce((a,s)=>a+s.total,0),tS=qS.reduce((a,s)=>a+s.score,0);
  const gP=tQ>0?Math.round(tS/tQ*100):0,fD=p.flashDone||0,fK=p.flashKnew||0,fP=fD>0?Math.round(fK/fD*100):0;
  tc.innerHTML=`<div class="stats-grid">
    ${[{i:"❓",l:"Quizzes",v:qS.length,c:"#a78bfa"},{i:"🃏",l:"Flashcards",v:fD,c:"#34d399"},{i:"🏆",l:"Acerto quiz",v:gP+"%",c:"#fbbf24"},{i:"💡",l:"Acerto FC",v:fP+"%",c:"#f472b6"}]
      .map(s=>`<div class="stat-card" style="border-top-color:${s.c}"><div style="font-size:24px">${s.i}</div><div class="stat-val" style="color:${s.c}">${s.v}</div><div class="stat-label">${s.l}</div></div>`).join("")}
  </div>
  ${qS.length>0?`<p style="font-family:var(--fh);font-weight:700;font-size:16px;margin-bottom:12px">Histórico de quizzes</p>
    ${[...qS].reverse().map(s=>{const p2=Math.round(s.score/s.total*100);return`<div class="hist-row">
      <span style="flex:1;font-size:13px">${new Date(s.date).toLocaleDateString("pt-BR")}</span>
      <span style="font-size:13px;color:var(--muted)">${s.score}/${s.total}</span>
      <div class="prog-wrap" style="flex:3;margin:0 10px"><div class="prog-bar" style="width:${p2}%"></div></div>
      <span style="font-size:13px;color:var(--muted);min-width:36px;text-align:right">${p2}%</span>
    </div>`}).join("")}`
  :`<div class="empty" style="padding:36px 0"><div style="font-size:48px">📊</div>
    <p class="empty-title">Sem atividades ainda</p>
    <p class="empty-sub">Faça um quiz ou flashcard para ver seu progresso aqui.</p></div>`}`;
}

// ── SETTINGS ──────────────────────────────────────────────────────
function settings(){
  const page=document.createElement("div"); page.className="page";
  page.appendChild(mkHdr());
  const main=document.createElement("main"); main.className="main main-sm";
  main.innerHTML=`<div class="hero" style="margin-bottom:28px">
    <button class="btn btn-ghost btn-sm" id="stB" style="margin-bottom:16px">← Voltar</button>
    <h1 class="hero-title">⚙️ Configurações</h1>
  </div>
  <div class="settings-card">
    <h3>Alterar senha do ADM</h3>
    <p>A nova senha será usada no próximo acesso como ADM.</p>
    <input class="inp" id="nP" type="password" placeholder="Nova senha"/>
    <button class="btn btn-primary" id="sS">Salvar senha</button>
    <p id="sO" class="ok-msg" style="display:none">✓ Senha atualizada!</p>
  </div>`;
  page.appendChild(main); ROOT.appendChild(page);
  document.getElementById("stB").onclick=()=>go("home");
  document.getElementById("sS").onclick=async()=>{
    const p=document.getElementById("nP").value.trim(); if(!p)return;
    const h=btoa(p);
    S.admHash=h;
    S.db.admHash=h;
    await persistDB();
    document.getElementById("nP").value="";
    const ok=document.getElementById("sO"); ok.style.display="block";
    setTimeout(()=>{if(ok)ok.style.display="none"},3000);
  };
}

// ── BOOT ──────────────────────────────────────────────────────────
async function boot(){
  ROOT.innerHTML=`<div class="center"><div class="spinner"></div><p style="color:var(--muted);font-size:14px">Iniciando StudyNet…</p></div>`;
  try{
    S.db = await dbRead();
    // Init DB if empty
    if(!S.db.subjects){
      S.db = {subjects:[], sessions:{}, progress:{}, admHash: btoa(ADM_SENHA_INICIAL)};
      await persistDB();
    }
    S.admHash = S.db.admHash || btoa(ADM_SENHA_INICIAL);
  }catch(e){
    ROOT.innerHTML=`<div class="center" style="text-align:center;gap:16px">
      <div style="font-size:48px">⚠️</div>
      <p style="font-family:'Fraunces',serif;font-weight:700;font-size:18px">Erro de conexão</p>
      <p style="color:var(--muted);font-size:13px;max-width:340px">Verifique se as credenciais do JSONBin e Cloudinary estão corretas no arquivo HTML.</p>
      <code style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:12px;color:#ff4d6d;word-break:break-all;max-width:340px">${esc(e.message)}</code>
    </div>`;
    return;
  }
  if(!S.role)go("gate");else go("home");
}

boot();
</script>
